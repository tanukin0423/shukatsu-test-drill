<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 SPI3対策ドリル｜就活の木</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --green-dark:#2C5F2D;--green-mid:#4A8C4B;--green-light:#97BC62;
  --green-pale:#E8F5E9;--green-ultra:#F0FDF0;
  --amber:#F59E0B;--amber-light:#FEF3C7;
  --gray-dark:#1F2937;--gray-mid:#6B7280;--gray-light:#F3F4F6;
  --white:#FFFFFF;
  --shadow-sm:0 2px 8px rgba(44,95,45,0.10);
  --shadow-md:0 6px 24px rgba(44,95,45,0.15);
  --purple:#7C3AED;--purple-pale:#F5F3FF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--green-ultra);min-height:100vh;color:var(--gray-dark);}

/* HERO */
.hero{background:linear-gradient(150deg,var(--green-dark) 0%,#3a7a3b 60%,var(--green-mid) 100%);padding:36px 20px 0;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 50%,rgba(151,188,98,0.18) 0%,transparent 50%);pointer-events:none;}
.hero-tree{position:absolute;right:-10px;bottom:0;font-size:110px;opacity:0.09;line-height:1;pointer-events:none;}
.brand-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.90);font-size:11px;font-weight:700;letter-spacing:0.12em;padding:5px 14px;border-radius:20px;margin-bottom:14px;}
.hero-icon{font-size:48px;display:block;animation:floatIcon 3s ease-in-out infinite;margin-bottom:8px;}
@keyframes floatIcon{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.hero h1{font-size:clamp(20px,5vw,28px);font-weight:900;color:#fff;margin-bottom:6px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.80);line-height:1.6;padding-bottom:20px;}

/* SECTION TABS */
.section-bar{background:rgba(0,0,0,0.18);padding:12px 12px 0;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.section-tab{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:12px 12px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.80);transition:all 0.18s;white-space:nowrap;}
.section-tab:hover{background:rgba(255,255,255,0.22);}
.section-tab.active{background:var(--white);color:var(--green-dark);}

/* CONTENT */
.content{max-width:700px;margin:0 auto;padding:24px 16px 60px;}

/* SCORE BAR */
.score-bar{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.score-label{font-size:11px;font-weight:700;color:var(--gray-mid);margin-bottom:2px;}
.score-nums{font-size:22px;font-weight:900;color:var(--green-dark);}
.score-nums span{font-size:13px;font-weight:400;color:var(--gray-mid);}
.progress-wrap{flex:1;min-width:120px;}
.progress-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green-mid),var(--green-light));border-radius:4px;transition:width 0.4s ease;}
.progress-text{font-size:10px;color:var(--gray-mid);margin-top:4px;}
.btn-reset{padding:7px 14px;background:var(--green-pale);border:1px solid #C8E6C9;color:var(--green-dark);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-reset:hover{background:#d4edda;}

/* SECTION HEADER */
.section-header{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);padding:16px 20px;margin-bottom:16px;border-left:5px solid var(--green-mid);}
.section-header h2{font-size:17px;font-weight:900;color:var(--green-dark);margin-bottom:4px;}
.section-header p{font-size:12px;color:var(--gray-mid);line-height:1.6;}

/* SUBSECTION LABEL */
.subsection-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--gray-mid);letter-spacing:0.08em;margin:20px 0 10px;}
.subsection-label::after{content:'';flex:1;height:1px;background:#D1E8D2;}

/* QUESTION CARD */
.q-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.q-head{padding:13px 16px 10px;border-bottom:1px solid #F0F0F0;display:flex;align-items:flex-start;gap:10px;}
.q-num{background:var(--green-dark);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.q-num.ai-num{background:var(--purple);}
.q-text{font-size:13px;font-weight:700;line-height:1.65;color:var(--gray-dark);}
.q-body{padding:10px 16px 14px;}
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;border:1.5px solid #E5E7EB;background:#FAFAFA;cursor:pointer;text-align:left;font-size:13px;font-weight:500;color:var(--gray-dark);transition:all 0.15s;width:100%;}
.choice-btn:hover:not(:disabled){border-color:var(--green-mid);background:var(--green-pale);color:var(--green-dark);}
.choice-label{width:22px;height:22px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all 0.15s;}
.choice-btn:hover:not(:disabled) .choice-label{background:var(--green-mid);color:#fff;}
.choice-btn.correct{border-color:#22c55e;background:#F0FDF4;color:#15803d;}
.choice-btn.correct .choice-label{background:#22c55e;color:#fff;}
.choice-btn.wrong{border-color:#ef4444;background:#FEF2F2;color:#991b1b;}
.choice-btn.wrong .choice-label{background:#ef4444;color:#fff;}
.choice-btn.show-correct{border-color:#22c55e;background:#F0FDF4;color:#15803d;}
.choice-btn.show-correct .choice-label{background:#22c55e;color:#fff;}
.choice-btn:disabled{cursor:default;}

/* EXPLANATION */
.explanation{margin-top:10px;padding:11px 13px;border-radius:9px;font-size:12px;line-height:1.75;}
.explanation.correct-exp{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:1px solid #BBF7D0;color:#14532d;}
.explanation.wrong-exp{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:1px solid #FDE68A;color:#78350f;}
.exp-head{font-size:11px;font-weight:700;margin-bottom:4px;}

/* SECTION RESULT */
.section-result{background:var(--white);border-radius:14px;box-shadow:var(--shadow-md);padding:24px;text-align:center;margin-bottom:16px;}
.result-emoji{font-size:44px;margin-bottom:8px;}
.result-score{font-size:40px;font-weight:900;color:var(--green-dark);}
.result-score span{font-size:16px;color:var(--gray-mid);font-weight:400;}
.result-pct{font-size:24px;font-weight:900;margin:4px 0 12px;}
.doshi-box{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border-left:4px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;text-align:left;margin:12px 0;}
.doshi-label{font-size:10px;font-weight:700;color:#92400E;margin-bottom:4px;display:block;}
.doshi-box p{font-size:12px;color:#78350F;font-style:italic;line-height:1.75;}
.btn-retry{padding:10px 24px;background:linear-gradient(135deg,var(--green-dark),var(--green-mid));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-retry:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}

/* AI SECTION */
.ai-section{background:var(--white);border-radius:16px;box-shadow:var(--shadow-md);margin-bottom:16px;overflow:hidden;}
.ai-section-head{background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:16px 20px;display:flex;align-items:center;gap:12px;}
.ai-section-icon{font-size:28px;}
.ai-section-title{color:#fff;font-size:15px;font-weight:900;}
.ai-section-sub{color:rgba(255,255,255,0.80);font-size:11px;margin-top:2px;}
.ai-section-body{padding:18px 20px;}
.ai-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.ai-controls-label{font-size:12px;font-weight:700;color:var(--gray-dark);}
.difficulty-btn{padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.difficulty-btn.normal{background:var(--green-pale);border-color:#C8E6C9;color:var(--green-dark);}
.difficulty-btn.normal.selected{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.difficulty-btn.hard{background:var(--purple-pale);border-color:#C4B5FD;color:var(--purple);}
.difficulty-btn.hard.selected{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-ai-generate{padding:10px 24px;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.btn-ai-generate:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,58,237,0.30);}
.btn-ai-generate:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.ai-loading{text-align:center;padding:20px;color:var(--purple);font-size:13px;font-weight:600;}
.ai-loading-dots::after{content:'...';animation:dots 1.2s infinite;}
@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...';}100%{content:'.';}}
.ai-questions-area{display:flex;flex-direction:column;gap:10px;}
.ai-note{font-size:11px;color:var(--gray-mid);background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;margin-bottom:12px;}

/* FOOTER */
.footer{text-align:center;padding:0 16px 40px;font-size:11px;color:var(--gray-mid);}
.footer-brand{font-weight:700;color:var(--green-mid);}

@media(max-width:480px){
  .hero{padding:28px 14px 0;}
  .content{padding:18px 12px 50px;}
  .q-text{font-size:12px;}
  .choice-btn{font-size:12px;padding:9px 11px;}
  .ai-controls{gap:7px;}
}
</style>
</head>
<body>

<!-- ====== APIキー設定バー ====== -->
<div id="apiKeyBar" style="background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:999;">
  <span style="font-size:14px;">🔑</span>
  <span style="color:#fff;font-size:12px;font-weight:700;white-space:nowrap;">Gemini APIキー：</span>
  <input id="apiKeyInput" type="password"
    placeholder="AIzaSy... を入力して保存してください"
    style="flex:1;min-width:180px;padding:7px 12px;border-radius:8px;border:none;font-size:12px;outline:none;"
  />
  <button onclick="saveApiKey()" style="padding:7px 16px;background:#22c55e;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">💾 保存</button>
  <button onclick="clearApiKey()" style="padding:7px 12px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;">🗑️</button>
  <span id="apiKeyStatus" style="font-size:11px;font-weight:700;white-space:nowrap;"></span>
</div>


<div class="hero">
  <div class="hero-tree">🌳</div>
  <div class="brand-badge">🌱 就活の木｜キャリア支援課</div>
  <span class="hero-icon">📖</span>
  <h1>SPI3 対策ドリル</h1>
  <p class="hero-sub">言語・非言語・英語 各セクション10〜20問 ＋ AI自動出題<br>4択・即時採点・解説つき｜普通・難関の2レベル</p>
  <div class="section-bar" id="sectionBar"></div>
</div>

<div class="content">
  <div class="score-bar">
    <div>
      <div class="score-label">総合スコア</div>
      <div class="score-nums" id="totalScore">0<span> / 0問</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0% 正答率（0/100問回答済み）</div>
    </div>
    <button class="btn-reset" onclick="resetAll()">🔄 リセット</button>
  </div>
  <div id="mainArea"></div>
</div>

<div class="footer"><span class="footer-brand">🌱 就活の木</span>｜多摩大学キャリア支援課<br>キャリ爺（北山 四郎）作成</div>

<script>

// ====== APIキー管理（sessionStorage使用） ======
const GEMINI_KEY_NAME = 'shukatsu_gemini_key';

function getGeminiKey() {
  return sessionStorage.getItem(GEMINI_KEY_NAME) || '';
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { showApiStatus('❌ キーを入力してください', '#fca5a5'); return; }
  if (!key.startsWith('AIza')) { showApiStatus('⚠️ AIzaSy...で始まるキーを入力', '#fde68a'); return; }
  sessionStorage.setItem(GEMINI_KEY_NAME, key);
  document.getElementById('apiKeyInput').value = '';
  showApiStatus('✅ 保存済み！AI出題が使えます', '#86efac');
}

function clearApiKey() {
  sessionStorage.removeItem(GEMINI_KEY_NAME);
  showApiStatus('🗑️ 削除しました', '#e5e7eb');
}

function showApiStatus(msg, color) {
  const el = document.getElementById('apiKeyStatus');
  el.style.color = color;
  el.textContent = msg;
  setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 5000);
}

// ページ読み込み時に保存済みキーを確認
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem(GEMINI_KEY_NAME);
  if (saved) showApiStatus('✅ APIキー設定済み', '#86efac');
});

async function callGemini(systemPrompt, userPrompt) {
  const key = getGeminiKey();
  if (!key) throw new Error('NO_KEY');
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API Error');
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}



// ==================== DATA ====================
const SECTIONS = [
  { id:'lang', icon:'📖', name:'SPI言語', desc:'語彙・語句・文章読解・語句の関係' },
  { id:'math', icon:'🔢', name:'SPI非言語', desc:'計算・割合・速さ・仕事算・確率・図形' },
  { id:'eng',  icon:'🇬🇧', name:'SPI英語',  desc:'語彙・文法・読解・語句補充' },
];

const QUESTIONS = {
lang: [
  // 語彙・読み方
  {q:'「逡巡」の読み方として正しいものはどれか。',c:['しゅんじゅん','しゅんじゅ','じゅんしゅん','じゅんしゅ'],a:0,exp:'「逡巡（しゅんじゅん）」は、ためらうこと・なかなか決心がつかない様子。'},
  {q:'「齟齬」の読み方として正しいものはどれか。',c:['さくご','そご','さこ','そこ'],a:1,exp:'「齟齬（そご）」は、食い違い・かみ合わないこと。「齟齬をきたす」のように使う。'},
  {q:'「恣意的」の意味として正しいものはどれか。',c:['論理的な','自分勝手な','慎重な','積極的な'],a:1,exp:'「恣意的（しいてき）」は、自分の思うまま・気ままで勝手な様子。'},
  {q:'「瑕疵」の意味として正しいものはどれか。',c:['長所','欠点・傷','才能','技術'],a:1,exp:'「瑕疵（かし）」は欠点・傷・不完全な点のこと。法律・不動産で頻出の語。'},
  {q:'「敷衍」の意味として正しいものはどれか。',c:['物事を省略すること','物事を詳しく説明・展開すること','物事を隠すこと','物事を批判すること'],a:1,exp:'「敷衍（ふえん）」は、大意を詳しく説明したり広げて述べること。'},
  {q:'次の語句のうち「慶弔」の「弔」の意味はどれか。',c:['喜び','悲しみ・悼むこと','祝うこと','お礼'],a:1,exp:'「弔（とむら）う」は死を悼むこと。「慶弔」は慶事（祝い）と弔事（葬儀）の両方を指す。'},
  {q:'「付和雷同」の意味として正しいものはどれか。',c:['力を合わせて困難を乗り越えること','自分の意見なく人に同調すること','雷のように素早く行動すること','多数決で物事を決めること'],a:1,exp:'「付和雷同（ふわらいどう）」は自分の意見を持たず、みだりに人の意見に同調すること。'},
  {q:'「一期一会」の意味として正しいものはどれか。',c:['一つの目標に向かって努力すること','一生に一度の出会いと大切にすること','物事はひとつずつ確実に行うこと','出会いと別れを繰り返すこと'],a:1,exp:'「一期一会（いちごいちえ）」は茶道から生まれた言葉。この出会いは一生に一度と心得て誠実に向き合うこと。'},
  {q:'「捲土重来」の読み方と意味として正しいものはどれか。',c:['けんどじゅうらい：一気に攻め立てること','けんどちょうらい：勢いよく押し寄せること','けんどちょうらい：一度敗れた後に勢いを盛り返すこと','けんどじゅうらい：多くの人が集まること'],a:2,exp:'「捲土重来（けんどちょうらい）」は一度負けた者が勢いを盛り返して再び挑むこと。'},
  {q:'「五十歩百歩」の意味として正しいものはどれか。',c:['少しの努力でも大きな差が生まれる','本質的な差はなく似たり寄ったりである','努力の量と成果は比例する','わずかな差が大きな結果を生む'],a:1,exp:'「五十歩百歩」は程度の差があっても本質的には同じであることのたとえ。'},
  // 語句の関係
  {q:'「医師：患者」と同じ関係にあるものはどれか。',c:['教師：生徒','親：子','警察：犯人','弁護士：依頼人'],a:3,exp:'医師と患者、弁護士と依頼人はどちらも「専門家とサービスを受ける人」という関係。'},
  {q:'「大きい」の対義語として正しいものはどれか。',c:['細かい','小さい','薄い','低い'],a:1,exp:'「大きい」の直接の対義語は「小さい」。「高い↔低い」「厚い↔薄い」も頻出。'},
  {q:'次のうち仲間外れはどれか。「桜・梅・松・紅葉・菊」',c:['桜','松','菊','紅葉'],a:1,exp:'桜・梅・紅葉・菊は落葉性（季節感がある花・紅葉）。松は常緑樹で他と性質が異なる。'},
  {q:'「刀：鞘（さや）」と同じ関係はどれか。',c:['筆：墨','傘：雨','剣：石','鉛筆：ケース'],a:3,exp:'刀と鞘は「道具とそれを収める入れ物」の関係。同様に鉛筆とケースも同じ関係。'},
  {q:'「蛇足」と同じ意味のことわざはどれか。',c:['無用の長物','石橋を叩いて渡る','急いては事を仕損じる','七転び八起き'],a:0,exp:'「蛇足」は余計なもの・あってもなくても変わらないものを付け加えること。「無用の長物」も役に立たない余分なものの意。'},
  // 文章読解

// ==================== STATE ====================
let currentSection = 'lang';
let answered = { lang:{}, math:{}, eng:{} };
let aiAnswered = { lang:{}, math:{}, eng:{} };
let aiQuestions = { lang:[], math:[], eng:[] };
let selectedDifficulty = { lang:'normal', math:'normal', eng:'normal' };
let aiLoading = { lang:false, math:false, eng:false };

const TOTAL_FIXED = Object.values(QUESTIONS).reduce((s,q)=>s+q.length,0);

// ==================== TABS ====================
function buildTabs() {
  document.getElementById('sectionBar').innerHTML = SECTIONS.map(s=>`
    <button class="section-tab${s.id===currentSection?' active':''}" onclick="switchSection('${s.id}')">
      ${s.icon} ${s.name}
    </button>`).join('');
}
function switchSection(id) {
  currentSection = id;
  buildTabs();
  renderMain();
  updateScore();
}

// ==================== SCORE ====================
function updateScore() {
  let correct=0, done=0;
  ['lang','math','eng'].forEach(sid=>{
    Object.values(answered[sid]).forEach(a=>{ if(a.correct) correct++; done++; });
    Object.values(aiAnswered[sid]).forEach(a=>{ if(a.correct) correct++; done++; });
  });
  document.getElementById('totalScore').innerHTML = `${correct}<span> / ${done}問</span>`;
  const pct = done>0?Math.round(correct/done*100):0;
  document.getElementById('progressFill').style.width = Math.min(done/TOTAL_FIXED*100,100)+'%';
  document.getElementById('progressText').textContent = `${pct}% 正答率（${done}/${TOTAL_FIXED}問以上回答済み）`;
}

// ==================== RENDER MAIN ====================

  const s = SECTIONS.find(x=>x.id===currentSection);
  const qs = QUESTIONS[currentSection];
  const ans = answered[currentSection];

    html += `<div class="subsection-label">📝 問題を解いてみよう</div>`;

  }

  html += `

// ==================== QUESTION CARD ====================
function renderQCard(sid, i, q, a, isAI) {
  const isDone = a !== undefined;
  const labels = ['A','B','C','D'];
  const numClass = isAI ? 'q-num ai-num' : 'q-num';
  const numLabel = isAI ? `AI-${i+1}` : `Q${i+1}`;
  const choices = q.c.map((c,ci)=>{
    let cls='choice-btn';
    if(isDone){
      if(ci===q.a) cls+=' show-correct';
      else if(ci===a.chosen&&!a.correct) cls+=' wrong';
    }
    const fn = isAI
      ? `answerAI('${sid}',${i},${ci})`
      : `answer('${sid}',${i},${ci})`;
    return `<button class="${cls}" ${isDone?'disabled':''} onclick="${fn}">
      <span class="choice-label">${labels[ci]}</span><span>${c}</span>
    </button>`;
  }).join('');

  let expHtml='';
  if(isDone){
    const ok=a.correct;
    expHtml=`<div class="explanation ${ok?'correct-exp':'wrong-exp'}">
      <div class="exp-head">${ok?'✅ 正解！':`❌ 不正解。正解：「${q.c[q.a]}」`}</div>
      <div>${q.exp}</div>
    </div>`;
  }
  return `<div class="q-card">
    <div class="q-head"><span class="${numClass}">${numLabel}</span><div class="q-text">${q.q}</div></div>
    <div class="q-body"><div class="choices">${choices}</div>${expHtml}</div>
  </div>`;
}

// ==================== ANSWER ====================
function answer(sid, qi, chosen) {
  const q = QUESTIONS[sid][qi];
  answered[sid][qi] = { chosen, correct: chosen===q.a };
  renderMain(); updateScore();
}
function answerAI(sid, qi, chosen) {
  const q = aiQuestions[sid][qi];
  aiAnswered[sid][qi] = { chosen, correct: chosen===q.a };
  renderMain(); updateScore();
}

// ==================== SECTION RESULT ====================
function renderSectionResult(sid) {
  const qs = QUESTIONS[sid];
  const ans = answered[sid];
  const correct = Object.values(ans).filter(a=>a.correct).length;
  const total = qs.length;
  const pct = Math.round(correct/total*100);
  let emoji='😢',msg='もう一度挑戦！',doshi='「間違えた問題の解説を読み返し、弱点を把握しましょう。」';
  if(pct>=80){emoji='🏆';msg='素晴らしい高得点！';doshi='「この調子でAI出題にも挑戦してみてください！」';}
  else if(pct>=60){emoji='😊';msg='合格ライン！もう少し！';doshi='「あと一歩。解説をしっかり確認してください。」';}
  else if(pct>=40){emoji='😅';msg='基礎を固め直そう。';doshi='「焦らず一問ずつ解説を読んで理解していこう。」';}

  return `<div class="section-result">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${correct}<span> / ${total}問</span></div>
    <div class="result-pct" style="color:${pct>=60?'var(--green-mid)':'#ef4444'}">${pct}%</div>
    <div style="font-size:13px;color:var(--gray-mid);margin-bottom:8px;">${msg}</div>
    <div class="doshi-box"><span class="doshi-label">🔥 キャリ爺より</span><p>${doshi}</p></div>
    <button class="btn-retry" onclick="retrySection('${sid}')">🔄 もう一度解く</button>
  </div>`;
}
function retrySection(sid) {
  answered[sid]={};
  renderMain(); updateScore();
}

// ==================== AI SECTION ====================

  const s = SECTIONS.find(x=>x.id===sid);
  const diff = selectedDifficulty[sid];

  let aiQsHtml = '';
  if(aiQs.length>0){
    aiQsHtml = `<div class="ai-questions-area">`
      + aiQs.map((q,i)=>renderQCard(sid,i,q,aiAns[i],true)).join('')
      + `</div>`;

  const loadingHtml = loading
    ? `<div class="ai-loading">🤖 AIが問題を生成中<span class="ai-loading-dots"></span></div>`
    : '';

  return `<div class="ai-section">
    <div class="ai-section-head">
      <span class="ai-section-icon">🤖</span>
      <div>
        <div class="ai-section-title">AI自動出題コーナー｜${s.name}</div>
        <div class="ai-section-sub">難易度を選んでボタンを押すと、AIが新しい問題を生成します</div>
      </div>
    </div>
    <div class="ai-section-body">
      <div class="ai-note">⚠️ AIが生成した問題です。まれに不正確な場合があります。解説も参考程度にご活用ください。</div>
      <div class="ai-controls">
        <span class="ai-controls-label">難易度：</span>
        <button class="difficulty-btn normal${diff==='normal'?' selected':''}" onclick="setDifficulty('${sid}','normal')">📗 普通</button>
        <button class="difficulty-btn hard${diff==='hard'?' selected':''}" onclick="setDifficulty('${sid}','hard')">📕 難関</button>
        <button class="btn-ai-generate" onclick="generateAI('${sid}')" ${loading?'disabled':''}>
          ${loading?'⏳ 生成中...':'✨ AI問題を生成（5問）'}

      ${loadingHtml}

    </div>

}

function setDifficulty(sid, diff) {
  selectedDifficulty[sid] = diff;
  renderMain();
}

// ==================== AI GENERATE ====================
async function generateAI(sid) {
  const s = SECTIONS.find(x=>x.id===sid);
  const diff = selectedDifficulty[sid];
  const diffLabel = diff==='hard' ? '難関（難しい・応用問題）' : '普通（標準的な問題）';

  const prompts = {
    lang: `SPI3の言語問題（語彙・語句関係・ことわざ・文章読解）`,
    math: `SPI3の非言語問題（計算・割合・速さ・仕事算・確率）`,
    eng:  `SPI3の英語問題（語彙・文法・読解・穴埋め）`,
  };

  const systemPrompt = `あなたはSPI3試験の問題作成専門家です。就活生向けの${prompts[sid]}を${diffLabel}レベルで5問作成してください。
必ずJSON形式のみで返答してください。他のテキストは一切含めないでください。
形式：{"questions":[{"q":"問題文","c":["選択肢A","選択肢B","選択肢C","選択肢D"],"a":正解インデックス(0-3),"exp":"解説文（100字以内）"}]}
条件：
- 4択問題
- 正解は必ず1つ
- 解説は簡潔に（数式や根拠を含む）
- ${diff==='hard'?'応用・複合問題で高難度に':'基本を押さえた標準的な問題に'}
- 日本語で作成（英語セクションは問題・選択肢は英語OK）`;

  const userContent = `${prompts[sid]}を${diffLabel}レベルで5問作成してください。JSON形式のみで返答してください。`;
  aiLoading[sid] = true;
  renderMain();

  try {
    const key = getGeminiKey();
    if (!key) throw new Error('NO_KEY');
    const text = await callGemini(systemPrompt, userContent);
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    aiQuestions[sid] = parsed.questions || [];
    aiAnswered[sid] = {};
  } catch(e) {
    if (e.message === 'NO_KEY') {
      aiQuestions[sid] = [{q:'⚠️ Gemini APIキーが設定されていません。トップページ（index.html）でAPIキーを設定してください。',c:['トップページへ戻る','—','—','—'],a:0,exp:'index.htmlのAPIキー設定欄にGemini APIキーを入力・保存してください。'}];
    } else {
      aiQuestions[sid] = [{q:'AI問題の生成中にエラーが発生しました。APIキーを確認してもう一度お試しください。',c:['再試行する','—','—','—'],a:0,exp:'エラー：'+e.message}];
    }
    aiAnswered[sid] = {};
  }

  aiLoading[sid] = false;
  renderMain();
}

// ==================== RESET ====================
function resetAll() {
  answered={lang:{},math:{},eng:{}};
  aiAnswered={lang:{},math:{},eng:{}};
  aiQuestions={lang:[],math:[],eng:[]};
  renderMain(); updateScore();
}

// ==================== INIT ====================
buildTabs();
renderMain();
updateScore();
