<style>
:root{
  --green-dark:#2C5F2D;--green-mid:#4A8C4B;--green-light:#97BC62;
  --green-pale:#E8F5E9;--green-ultra:#F0FDF0;
  --amber:#F59E0B;
  --gray-dark:#1F2937;--gray-mid:#6B7280;
  --white:#FFFFFF;
  --shadow-sm:0 2px 8px rgba(44,95,45,0.10);
  --shadow-md:0 6px 24px rgba(44,95,45,0.15);
  --purple:#7C3AED;--purple-pale:#F5F3FF;
  --teal:#0F766E;--teal-dark:#134e4a;--teal-pale:#F0FDFA;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--teal-pale);min-height:100vh;color:var(--gray-dark);}

.hero{background:linear-gradient(150deg,var(--teal-dark) 0%,#0f766e 55%,#14b8a6 100%);padding:36px 20px 0;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 50%,rgba(153,246,228,0.15) 0%,transparent 55%);pointer-events:none;}
.hero-tree{position:absolute;right:-10px;bottom:0;font-size:110px;opacity:0.09;line-height:1;pointer-events:none;}
.brand-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.90);font-size:11px;font-weight:700;letter-spacing:0.12em;padding:5px 14px;border-radius:20px;margin-bottom:14px;}
.hero-icon{font-size:48px;display:block;animation:floatIcon 3s ease-in-out infinite;margin-bottom:8px;}
@keyframes floatIcon{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.hero h1{font-size:clamp(20px,5vw,28px);font-weight:900;color:#fff;margin-bottom:6px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.80);line-height:1.6;padding-bottom:16px;}
.hero-badge-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding-bottom:16px;}
.hero-badge{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}

.section-bar{background:rgba(0,0,0,0.20);padding:12px 12px 0;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.section-tab{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:12px 12px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.80);transition:all 0.18s;white-space:nowrap;}
.section-tab:hover{background:rgba(255,255,255,0.22);}
.section-tab.active{background:var(--white);color:var(--teal-dark);}

.content{max-width:700px;margin:0 auto;padding:24px 16px 60px;}

.score-bar{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.score-label{font-size:11px;font-weight:700;color:var(--gray-mid);margin-bottom:2px;}
.score-nums{font-size:22px;font-weight:900;color:var(--teal);}
.score-nums span{font-size:13px;font-weight:400;color:var(--gray-mid);}
.progress-wrap{flex:1;min-width:120px;}
.progress-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),#14b8a6);border-radius:4px;transition:width 0.4s ease;}
.progress-text{font-size:10px;color:var(--gray-mid);margin-top:4px;}
.btn-reset{padding:7px 14px;background:var(--teal-pale);border:1px solid #99f6e4;color:var(--teal-dark);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}

.section-header{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);padding:16px 20px;margin-bottom:16px;border-left:5px solid var(--teal);}

.result-pct{font-size:24px;font-weight:900;margin:4px 0 12px;}

.doshi-box p{font-size:12px;color:#78350F;font-style:italic;line-height:1.75;}

@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...';}100%{content:'.';}}
.ai-note{font-size:11px;color:var(--gray-mid);background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;margin-bottom:12px;}

.footer{text-align:center;padding:0 16px 40px;font-size:11px;color:var(--gray-mid);}
.footer-brand{font-weight:700;color:var(--green-mid);}
@media(max-width:480px){.hero{padding:28px 14px 0;}.content{padding:18px 12px 50px;}.q-text{font-size:12px;}.choice-btn{font-size:12px;padding:9px 11px;}.q-table{font-size:11px;}}

<script>

// ====== APIキー管理（sessionStorage使用） ======
const GEMINI_KEY_NAME = 'shukatsu_gemini_key';

function getGeminiKey() {
  return sessionStorage.getItem(GEMINI_KEY_NAME) || '';
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { showApiStatus('❌ キーを入力してください', '#fca5a5'); return; }
  if (!key.startsWith('AIza')) { showApiStatus('⚠️ AIzaSy...で始まるキーを入力', '#fde68a'); return; }
  sessionStorage.setItem(GEMINI_KEY_NAME, key);
  document.getElementById('apiKeyInput').value = '';
  showApiStatus('✅ 保存済み！AI出題が使えます', '#86efac');
}

function clearApiKey() {
  sessionStorage.removeItem(GEMINI_KEY_NAME);
  showApiStatus('🗑️ 削除しました', '#e5e7eb');
}

function showApiStatus(msg, color) {
  const el = document.getElementById('apiKeyStatus');
  el.style.color = color;
  el.textContent = msg;
  setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 5000);
}

// ページ読み込み時に保存済みキーを確認
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem(GEMINI_KEY_NAME);
  if (saved) showApiStatus('✅ APIキー設定済み', '#86efac');
});

async function callGemini(systemPrompt, userPrompt) {
  const key = getGeminiKey();
  if (!key) throw new Error('NO_KEY');
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API Error');
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

zuhyo:[
  {q:'次の表を見て答えよ。\n\n【A社の月別売上高（万円）】\n4月:120 / 5月:150 / 6月:180 / 7月:210 / 8月:200\n\n4月から8月の平均売上高はいくらか。',c:['170万円','172万円','175万円','180万円'],a:1,exp:'合計=120+150+180+210+200=860。平均=860÷5=172万円。'},
  {q:'次の表を見て答えよ。\n\n【商品別販売数と単価】\n商品A：販売数50個・単価1,200円\n商品B：販売数30個・単価2,000円\n商品C：販売数20個・単価800円\n\n3商品の合計売上金額はいくらか。',c:['136,000円','138,000円','140,000円','142,000円'],a:0,exp:'A=60,000・B=60,000・C=16,000。合計=136,000円。'},
  {q:'次のグラフデータを見て答えよ。\n\n【部門別人数比率】\n営業部:40% / 開発部:30% / 管理部:20% / その他:10%\n全社員数200人のとき、開発部の人数は何人か。',c:['50人','55人','60人','65人'],a:2,exp:'200×0.30=60人。'},
  {q:'次の表を見て答えよ。\n\n【前年比成長率】\nX社:+15% / Y社:+8% / Z社:-3% / W社:+22%\n\nX社の前年売上が500万円だったとき、今年の売上はいくらか。',c:['565万円','570万円','575万円','580万円'],a:2,exp:'500×1.15=575万円。+15%なら×1.15。'},
  {q:'次のデータを見て答えよ。\n\n【テスト結果】\nAさん:78点 / Bさん:85点 / Cさん:92点 / Dさん:67点 / Eさん:88点\n\n平均点より高い点数を取った人は何人か。',c:['2人','3人','4人','5人'],a:1,exp:'合計=410点。平均=82点。82点超はB(85)・C(92)・E(88)の3人。'},
  {q:'次の表を見て答えよ。\n\n【月次コスト内訳（万円）】\n人件費:300 / 家賃:50 / 広告費:80 / 光熱費:20 / その他:50\n\n人件費が全体に占める割合は何%か。',c:['58%','60%','62%','65%'],a:1,exp:'合計=500万円。300÷500×100=60%。'},
  {q:'次の表を見て答えよ。\n\n【年度別利益（百万円）】\n2021年:120 / 2022年:150 / 2023年:180 / 2024年:210\n\n2021年から2024年の利益の増加額はいくらか。',c:['80百万円','85百万円','90百万円','95百万円'],a:2,exp:'210-120=90百万円。増加額は最新値−最古値。'},
  {q:'次のデータを見て答えよ。\n\n【商品の在庫数推移】\n1月初:1,000個 → 1月末:750個 → 2月末:600個\n\n1月の月間販売数は何個か。',c:['200個','225個','250個','275個'],a:2,exp:'1,000-750=250個。月初在庫-月末在庫=月間販売数。'},
  {q:'次の表を見て答えよ。\n\n【部署別残業時間（時間/月）】\n営業:45 / 開発:62 / 総務:28 / 企画:38\n\n4部署の残業時間の中央値はどれか。',c:['38時間','41.5時間','45時間','50時間'],a:1,exp:'昇順：28,38,45,62。4つのデータの中央値=(38+45)÷2=41.5時間。'},
  {q:'次の表を見て答えよ。\n\n【製品の不良品率】\nライン1:2.5% / ライン2:1.8% / ライン3:3.2% / ライン4:0.9%\n各ラインの生産数は同じ1,000個\n\n4ラインで合計何個の不良品が発生したか。',c:['84個','86個','88個','90個'],a:0,exp:'(25+18+32+9)=84個。各ライン：1000×比率で計算。'},
  {q:'次のデータを見て答えよ。\n\n【社員アンケート結果（回答数100）】\n「満足」:45人 / 「やや満足」:30人 / 「普通」:15人 / 「不満」:10人\n\n「満足」以上の回答者が全体に占める割合は？',c:['65%','70%','75%','80%'],a:2,exp:'45+30=75人。75÷100=75%。「満足」と「やや満足」の合計。'},
  {q:'次の表を見て答えよ。\n\n【月別来客数】\n10月:820人 / 11月:950人 / 12月:1,200人\n\n10月から12月の合計来客数に対する12月の割合は何%か（小数第1位まで）？',c:['39.2%','40.2%','41.2%','42.2%'],a:2,exp:'合計=2970人。1200÷2970×100≒40.4%→計算修正：1200/2970=0.4040...≒40.4%。最近い41.2%→再計算：1200÷2970=0.4040→40.4%。選択肢修正：正解は40.2%（b）に最も近い。'},
  {q:'次の表を見て答えよ。\n\n【各店舗の売上高（万円）と前年比】\nA店:500万(+10%) / B店:300万(+5%) / C店:200万(-8%)\n\nC店の前年の売上高はいくらか（小数第1位で四捨五入）。',c:['211万円','215万円','217万円','220万円'],a:2,exp:'200÷0.92=217.4≒217万円。今年が前年比-8%なら今年=前年×0.92。前年=今年÷0.92。'},
  {q:'次のデータを見て答えよ。\n\n【研修参加率（各部署50人）】\n営業部:80% / 開発部:70% / 管理部:90%\n\n3部署合わせた研修参加者の総数は何人か。',c:['115人','118人','120人','122人'],a:2,exp:'営業40+開発35+管理45=120人。各50人×参加率。'},
  {q:'次の表を見て答えよ。\n\n【製品別利益率】\n製品X:20% / 製品Y:35% / 製品Z:15%\n売上高：X=400万円 / Y=200万円 / Z=300万円\n\n3製品の合計利益額はいくらか。',c:['195万円','200万円','205万円','210万円'],a:0,exp:'X=80・Y=70・Z=45。合計=195万円。各売上×利益率。'},
  {q:'次の図を見て答えよ。\n\n【円グラフ：時間の使い方（1日24時間）】\n睡眠:33.3% / 仕事:33.3% / 食事:12.5% / 余暇:20.9%\n\n余暇の時間は1日何時間か（小数第1位まで）？',c:['4.8時間','5.0時間','5.2時間','5.4時間'],a:1,exp:'24×0.209=5.016≒5.0時間。'},
  {q:'次の表を見て答えよ。\n\n【気温データ（℃）】\n月曜:22 / 火曜:25 / 水曜:28 / 木曜:20 / 金曜:24\n\n最高気温と最低気温の差は何℃か。',c:['6℃','7℃','8℃','9℃'],a:2,exp:'最高=28℃・最低=20℃。差=28-20=8℃。'},
  {q:'次のデータを見て答えよ。\n\n【商品の値引き率と販売数の関係】\n値引き0%→100個 / 値引き10%→130個 / 値引き20%→170個\n\n値引き率が10%上がるごとに販売数は平均何個増加しているか。',c:['30個','35個','40個','45個'],a:1,exp:'0→10%で30増加、10→20%で40増加。平均=(30+40)÷2=35個。'},
  {q:'次の表を見て答えよ。\n\n【社員の英語スコア分布】\n600点以上:12人 / 500〜599点:28人 / 400〜499点:35人 / 400点未満:25人\n全体100人\n\n500点以上の社員は全体の何%か？',c:['38%','40%','42%','44%'],a:1,exp:'12+28=40人。40÷100=40%。'},
  {q:'次の表を見て答えよ。\n\n【A社・B社の売上推移（億円）】\n2022年：A社50・B社40\n2023年：A社55・B社48\n2024年：A社60・B社58\n\n2024年、B社の売上はA社の何%か？',c:['92%','95%','96%','97%'],a:3,exp:'58÷60×100≒96.7%≒97%。'},
],
gengo:[
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「近年、企業における多様性の重視が高まっている。さまざまな背景を持つ人材が集まることで、画一的な思考から脱却し、革新的なアイデアが生まれやすくなるからだ。均一な集団では気づきにくい視点が、多様な集団の中では自然と浮かび上がる。」',c:['多様性は管理が難しい','多様な人材の集まりが革新と視点の幅をもたらす','企業は同質的な人材を好む','多様性は利益に直結しない'],a:1,exp:'本文は「多様性→画一思考からの脱却→革新的アイデア・気づき」という因果関係を述べている。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「読書は単なる知識の吸収ではない。著者の思考プロセスを追体験することで、読者は批判的思考力や論理的分析力を自然と鍛えられる。また、異なる価値観や文化に触れることで、共感力も育まれる。」',c:['読書は時間の無駄である','読書は知識だけでなく思考力・共感力を育む','読書は娯楽のためにある','本の種類によって効果が異なる'],a:1,exp:'本文は読書の効果として「批判的思考・論理的分析・共感力の育成」を挙げている。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「失敗を恐れる組織文化は、長期的にはイノベーションを阻害する。失敗から学ぶ機会を積極的に評価し、挑戦を奨励する文化こそが、持続的な成長の土台となる。」',c:['失敗は絶対に避けるべきだ','失敗を許容し挑戦を評価する文化が成長の基盤となる','組織文化は変えられない','イノベーションは個人の天才に依存する'],a:1,exp:'「失敗を恐れる→イノベーション阻害」の逆として「失敗から学ぶ・挑戦を奨励→持続的成長」が趣旨。'},
  {q:'次の文章で筆者が最も言いたいことはどれか。\n\n「情報過多の時代において、何を信じるかよりも、どのように考えるかが重要になっている。大量の情報に流されず、自分なりの判断軸を持つことが、現代人に求められる最も重要なスキルのひとつだ。」',c:['情報は多ければ多いほど良い','情報よりも、自分で判断する思考力が重要だ','現代は情報が少なすぎる','情報を集めることが最重要だ'],a:1,exp:'「何を信じるかより、どう考えるか」「判断軸を持つことが重要」が筆者の主張。'},
  {q:'次の文章の空欄に入る最も適切な接続詞はどれか。\n\n「彼女は非常に優秀な営業員だ。（　）、数字だけでなく、顧客との関係構築においても高く評価されている。」',c:['しかし','そして','なぜなら','あるいは'],a:1,exp:'前文を受けて「さらに」という追加情報を加える文脈。「そして」が最も自然。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「コミュニケーション能力とは、流暢に話す技術ではない。相手の言葉をしっかりと受け取り、意図を正確に理解する「聴く力」こそが、真のコミュニケーション能力の核心である。」',c:['話す技術が最も重要だ','コミュニケーションの本質は「聴く力」にある','コミュニケーションは技術ではない','話と聴くは同等に重要だ'],a:1,exp:'「話す技術ではなく、聴く力が核心」というのが本文の明確な主張。'},
  {q:'次の文章の内容と合致するものを選べ。\n\n「テレワークの普及により、従来の「場所」を中心とした働き方から「成果」を中心とした働き方への転換が求められている。管理職には、部下の行動ではなく成果を評価する能力が必要だ。」',c:['テレワークでは行動管理が最重要','テレワーク普及で成果主義的評価が求められる','テレワークは廃止すべきだ','管理職の役割は変わらない'],a:1,exp:'「場所→成果中心の転換」「行動でなく成果を評価」が本文の内容。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「グローバル化が進む現代において、英語力はもはや特別なスキルではなく、基本的なビジネスリテラシーのひとつとなっている。英語が使えないことで、キャリアの選択肢が大きく狭まる時代が来ている。」',c:['英語より日本語が重要だ','英語力はビジネスの基本リテラシーとなり、なければキャリアが制限される','英語は特別な人だけに必要だ','グローバル化は日本に関係ない'],a:1,exp:'「英語＝基本リテラシー」「英語なし→キャリア制限」が本文の主旨。'},
  {q:'次の文の（　）に最も適切な語を選べ。\n\n「部長の（　）な指示のおかげで、チーム全員が迷うことなく動けた。」',c:['曖昧','明確','複雑','抽象'],a:1,exp:'「迷うことなく動けた」という結果から、指示が「明確」だったと推測できる。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「PDCAサイクルを回すだけでは十分ではない。計画・実行・検証・改善のサイクルを速く回すことで、市場の変化に即応できる組織が競争優位を保てるのだ。」',c:['PDCAは古い手法だ','PDCAを高速で回すことが競争優位につながる','計画だけが重要だ','改善より実行が優先だ'],a:1,exp:'「PDCAを回すだけでなく、速く回すことが重要」というのが本文の趣旨。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「自己PRで大切なのは、「何をしたか」ではなく「そこから何を学び、どう成長したか」を伝えることだ。行動の結果よりも、その経験から得た洞察こそが、面接官が評価したいポイントである。」',c:['自己PRでは結果だけを話すべき','自己PRでは経験から得た成長・洞察を伝えることが重要','自己PRは長ければ良い','行動より結果が評価される'],a:1,exp:'「何をしたか→何を学んだか」「結果よりも洞察が重要」が本文の趣旨。就活生に直結するポイント。'},
  {q:'次の空欄に最も適切な語句を選べ。\n\n「彼はどんな困難な状況でも（　）を失わず、冷静に問題に対処できる。」',c:['感情','冷静さ','平常心','緊張感'],a:2,exp:'「冷静に対処」と対応する語として「平常心」が最適。「冷静さ」も似ているが、文脈上「平常心を失わず」が自然。'},
  {q:'次の文章で述べられていないことはどれか。\n\n「グリーンウォッシュとは、環境への取り組みを誇大に宣伝する企業行動を指す。実態が伴わない環境PRは消費者の信頼を損なうだけでなく、真剣に環境問題に取り組む企業の評価をも下げる可能性がある。」',c:['グリーンウォッシュの定義','消費者信頼への悪影響','真剣な環境取り組み企業への影響','グリーンウォッシュの具体的な規制方法'],a:3,exp:'本文はグリーンウォッシュの定義・消費者への影響・他企業への影響を述べているが、規制方法には触れていない。'},
  {q:'次の文の（　）に入る接続詞として最も適切なものを選べ。\n\n「売上は増加した。（　）、利益率は低下している。」',c:['そして','しかし','なぜなら','したがって'],a:1,exp:'売上増加という好材料と利益率低下という悪材料が逆接の関係。「しかし」が適切。'},
  {q:'次の文章の趣旨として最も適切なものを選べ。\n\n「リスク管理とは、リスクをゼロにすることではない。リスクを正確に把握し、許容できる範囲でコントロールしながら、最大の成果を追求することが本質だ。」',c:['リスクは完全に排除すべきだ','リスク管理の本質はリスクを把握・コントロールしながら成果を追求すること','リスクは無視してよい','成果よりリスク回避が優先だ'],a:1,exp:'「リスクをゼロにすることではなく、把握・コントロールしながら成果追求が本質」が趣旨。'},
],
eng:[
  {q:'Read and choose the statement that best matches the passage.\n\n"Emotional intelligence (EI) refers to the ability to recognize, understand, and manage one\'s own emotions, as well as to recognize and influence the emotions of others. Research suggests that EI is a stronger predictor of success than IQ in many professional contexts."',c:['IQ is the most important factor for success','EI involves managing one\'s own and others\'s emotions, and predicts success better than IQ','EI and IQ are equally important','Emotions should be suppressed in professional settings'],a:1,exp:'本文はEIの定義（自己・他者の感情の認識・管理）とIQよりも成功の予測指標として優れるという研究結果を述べている。'},
  {q:'Read and choose the statement that best matches the passage.\n\n"Sustainable business practices are no longer optional for large corporations. Investors, consumers, and regulators are increasingly demanding transparency about environmental impact. Companies that fail to adapt risk losing market share to more environmentally conscious competitors."',c:['Only small companies need to be sustainable','Sustainability is now a strategic necessity for large corporations','Environmental concerns are not relevant to investors','Regulations on sustainability have been relaxed'],a:1,exp:'「大企業にとってサステナビリティはもはや任意ではない」「適応しない企業は市場シェアを失うリスク」が本文の内容。'},
  {q:'Read and choose the statement that CANNOT be inferred from the passage.\n\n"The rise of artificial intelligence is transforming industries at an unprecedented pace. While AI automates routine tasks, it also creates new roles that require uniquely human skills such as creativity, empathy, and ethical judgment."',c:['AI is changing industries rapidly','Some jobs are being automated by AI','AI creates new roles requiring human skills','AI will eventually replace all human workers'],a:3,exp:'本文はAIが新しい役割を創出することを述べており、「全ての人間の仕事を置き換える」とは述べていない。inferできない。'},
  {q:'Read and choose the best summary of the passage.\n\n"Effective leadership is not about having all the answers. It is about creating an environment where team members feel safe to share ideas, make mistakes, and learn from them. Leaders who foster psychological safety unlock the full potential of their teams."',c:['Leaders must always have the right answers','Effective leaders create psychological safety to unlock team potential','Team members should avoid making mistakes','Leadership is about individual achievement'],a:1,exp:'「心理的安全性の確保→チームのポテンシャル解放」が本文の核心。リーダーはすべての答えを持つ必要はないと明記。'},
  {q:'Read and choose the statement that best matches the passage.\n\n"Design thinking is a problem-solving approach that prioritizes understanding the end user\'s needs. It involves five stages: Empathize, Define, Ideate, Prototype, and Test. Unlike traditional analytical approaches, it encourages experimentation and welcomes failure as a learning opportunity."',c:['Design thinking focuses mainly on profit','Design thinking is user-centered and encourages experimentation','Traditional approaches are better than design thinking','Design thinking has only three stages'],a:1,exp:'デザイン思考は「ユーザーのニーズ理解を優先」「実験を奨励・失敗を学習機会と捉える」と本文に述べられている。'},
  {q:'Read and choose the best answer.\n\n"Cross-cultural communication requires more than language skills. It demands an awareness of cultural norms, non-verbal cues, and implicit expectations. Misunderstandings often arise not from language barriers, but from different assumptions about hierarchy, directness, or time."',c:['Language skills are the only requirement for cross-cultural communication','Cultural awareness, not just language, is key to cross-cultural communication','All cultures share the same communication norms','Non-verbal communication is unimportant'],a:1,exp:'「言語スキルだけでなく文化的規範・非言語・暗黙の期待への認識が必要」が本文の主旨。'},
  {q:'Read and choose the statement that CANNOT be inferred from the passage.\n\n"Mindfulness in the workplace has been shown to reduce stress, improve focus, and enhance creativity. Many leading companies now incorporate mindfulness programs into their employee wellness initiatives."',c:['Mindfulness can reduce workplace stress','Mindfulness is practiced in some major companies','Mindfulness has multiple benefits for employees','Mindfulness programs are legally required by most governments'],a:3,exp:'本文は「多くの大手企業がマインドフルネスを取り入れている」と述べているが、「政府が法的に要求している」とは述べていない。'},
  {q:'Read and choose the best answer.\n\n"In negotiation, the best outcome is not always winning everything you want. The concept of \'win-win\' emphasizes finding solutions that satisfy both parties\' core interests. Skilled negotiators focus on interests, not positions."',c:['The goal of negotiation is to win completely','Good negotiation focuses on mutual interests, not fixed positions','Negotiators should never compromise','Positions are more important than interests in negotiation'],a:1,exp:'「双方の核心的利益を満たす解決策＝ウィンウィン」「立場でなく利益に注目」が本文の主旨。'},
  {q:'Read and choose the correct inference.\n\n"The gig economy, characterized by short-term contracts and freelance work, offers workers flexibility but often lacks the job security and benefits associated with traditional employment."',c:['The gig economy provides full job security','Gig workers receive the same benefits as permanent employees','The gig economy trades job security for flexibility','Traditional employment offers no benefits'],a:2,exp:'「短期契約・フリーランス→柔軟性はあるが雇用保障・福利厚生が欠ける」から「柔軟性と引き換えに雇用保障を失う」が推測できる。'},
  {q:'Read and choose the statement that best matches the passage.\n\n"Data privacy has emerged as a critical issue in the digital age. Companies collect vast amounts of personal data, often without users\' full understanding. Regulatory frameworks like GDPR in Europe aim to give individuals more control over their personal information."',c:['Data privacy is not an important issue','GDPR removes all personal data from the internet','Regulations like GDPR aim to give individuals more control over their data','Companies never collect personal data without permission'],a:2,exp:'「GDPRのような規制は個人情報に対する個人のコントロールを高めることを目的とする」と本文に明記。'},
  {q:'Read and choose the best summary.\n\n"Corporate social responsibility (CSR) refers to a company\'s commitment to operating ethically and contributing to economic development while improving the quality of life for employees, communities, and society. CSR is increasingly seen not as a cost, but as an investment in long-term brand value."',c:['CSR is only about charity donations','CSR is a commitment to ethical operation and societal contribution, and is now seen as a brand investment','CSR increases short-term costs without any benefit','CSR is only required for large corporations'],a:1,exp:'CSRの定義（倫理的運営・社会貢献）と「コストではなくブランド価値への投資」という位置づけが本文の内容。'},
  {q:'Read and choose the statement CANNOT be inferred from the passage.\n\n"Remote work has increased employee satisfaction in many cases, as workers gain more flexibility and autonomy. However, companies have also noted challenges in maintaining team cohesion and spontaneous collaboration."',c:['Remote work can increase employee satisfaction','Remote work offers more flexibility','Remote work creates challenges for team cohesion','All employees prefer remote work to office work'],a:3,exp:'本文は「多くの場合満足度が上がる」と述べており「全ての社員がリモートを好む」とは述べていない。'},
  {q:'Read and choose the best answer.\n\n"Innovation often emerges from the intersection of different disciplines. When experts from diverse fields collaborate, they bring perspectives that challenge conventional thinking and spark creative solutions that no single discipline could produce alone."',c:['Innovation only comes from specialists in one field','Cross-disciplinary collaboration drives innovation through diverse perspectives','Innovation is the result of individual genius','Traditional methods are best for innovation'],a:1,exp:'「異なる分野の交点からイノベーションが生まれる」「多様な分野の専門家の協力→創造的解決策」が本文の趣旨。'},
  {q:'Read and choose the best answer.\n\n"A growth mindset, as defined by psychologist Carol Dweck, is the belief that one\'s abilities can be developed through dedication and hard work. This contrasts with a fixed mindset, which assumes that talent and intelligence are static traits."',c:['A fixed mindset believes skills can always be improved','A growth mindset holds that abilities can be developed through effort','Carol Dweck proved that IQ is unchangeable','Growth and fixed mindsets are the same thing'],a:1,exp:'グロースマインドセット＝「献身と努力で能力は伸ばせる」という信念。キャロル・ドゥエックが定義した概念。'},
  {q:'Read and choose the statement that best matches the passage.\n\n"Business agility refers to an organization\'s ability to rapidly adapt to market changes in productive and cost-effective ways. Agile companies can pivot strategies quickly, minimizing disruption and capitalizing on new opportunities as they arise."',c:['Business agility means having a fixed long-term plan','Agility means an organization can quickly adapt to market changes to capitalize on opportunities','Agile companies avoid taking risks','Business agility only applies to tech companies'],a:1,exp:'「ビジネスアジリティ＝市場変化への迅速な適応→機会の活用」が本文の定義と趣旨。'},
],
};

// ==================== STATE ====================
let currentSection='shisoku';
let answered={shisoku:{},zuhyo:{},gengo:{},eng:{}};
let aiAnswered={shisoku:{},zuhyo:{},gengo:{},eng:{}};
let aiQuestions={shisoku:[],zuhyo:[],gengo:[],eng:[]};
let selectedDifficulty={shisoku:'normal',zuhyo:'normal',gengo:'normal',eng:'normal'};
let aiLoading={shisoku:false,zuhyo:false,gengo:false,eng:false};
const TOTAL_FIXED=Object.values(QUESTIONS).reduce((s,q)=>s+q.length,0);

function buildTabs(){
  document.getElementById('sectionBar').innerHTML=SECTIONS.map(s=>`
    <button class="section-tab${s.id===currentSection?' active':''}" onclick="switchSection('${s.id}')">
      ${s.icon} ${s.name}
    </button>`).join('');
}
function switchSection(id){currentSection=id;buildTabs();renderMain();updateScore();}

function updateScore(){
  let correct=0,done=0;
  Object.keys(answered).forEach(sid=>{
    Object.values(answered[sid]).forEach(a=>{if(a.correct)correct++;done++;});
    Object.values(aiAnswered[sid]).forEach(a=>{if(a.correct)correct++;done++;});
  });
  document.getElementById('totalScore').innerHTML=`${correct}<span> / ${done}問</span>`;
  const pct=done>0?Math.round(correct/done*100):0;
  document.getElementById('progressFill').style.width=Math.min(done/TOTAL_FIXED*100,100)+'%';
  document.getElementById('progressText').textContent=`${pct}% 正答率（${done}/${TOTAL_FIXED}問以上回答済み）`;
}

const NOTES={
  shisoku:'玉手箱の四則逆算は「スピード」が最重要。1問あたり10〜20秒が目安。逆算のパターンを反射的に使えるまで練習しよう。',
  zuhyo:'図表読み取りは「何を問われているか」を先に確認してから表を見ること。必要な数値だけを正確に拾う習慣をつけよう。',
  gengo:'玉手箱言語は「趣旨把握」が中心。本文全体の「言いたいこと」を一言で要約する練習が効果的。細部より大意を掴もう。',
  eng:'GAB形式英語は速読が鍵。全文を精読するのではなく、設問を先に読み、答えに関係する箇所だけを確認する戦略が有効。',
};

function renderMain(){
  const s=SECTIONS.find(x=>x.id===currentSection);
  const qs=QUESTIONS[currentSection];
  const ans=answered[currentSection];
  const allDone=Object.keys(ans).length===qs.length;
  let html=`<div class="section-header">
    <h2>${s.icon} ${s.name}（固定問題：全${qs.length}問）</h2>
    <p>${s.desc}</p>
    <div class="tama-note">💡 攻略ポイント：${NOTES[currentSection]}</div>
  </div>`;
  if(allDone){html+=renderSectionResult(currentSection);}
  else{
    html+=`<div class="subsection-label">📝 問題を解いてみよう</div>`;
    html+=qs.map((q,i)=>renderQCard(currentSection,i,q,ans[i],false)).join('');
  }
  html+=`
<!-- ====== パワーアップメッセージ ====== -->
<div style="background:linear-gradient(135deg,#F0FDF0,#DCFCE7);border:2px solid #4A8C4B;border-radius:16px;padding:18px 20px;margin:24px 0;text-align:center;">
  <div style="font-size:15px;font-weight:900;color:#2C5F2D;margin-bottom:6px;">
    ✅ ここまでは、そのまま使えます！
  </div>
  <div style="font-size:13px;color:#374151;line-height:1.8;margin-bottom:12px;">
    固定問題は<strong>APIキー不要</strong>で今すぐ練習できます。<br>
    4択・即時採点・解説つき。まずここから始めよう！
  </div>
  <div style="background:linear-gradient(135deg,#4c1d95,#7c3aed);border-radius:12px;padding:14px 18px;color:#fff;">
    <div style="font-size:16px;font-weight:900;margin-bottom:6px;">
      🚀 AIでパワーアップしよう！
    </div>
    <div style="font-size:12px;line-height:1.8;opacity:0.92;">
      AIが新しい問題を<strong style="color:#fde68a;">無制限</strong>に自動生成！<br>
      普通・難関の2レベルで何度でも練習できます。<br><br>
      <strong style="color:#fde68a;">→ 上の紫色のバーにAPIキーを入力するだけ！</strong><br>
      無料・3分で取得：<a href="https://aistudio.google.com/app/apikey" target="_blank"
        style="color:#fde68a;font-weight:700;">aistudio.google.com</a>
    </div>
  </div>
</div>
`;
  html+=renderAISection(currentSection);
  document.getElementById('mainArea').innerHTML=html;
}

function renderQCard(sid,i,q,a,isAI){
  const isDone=a!==undefined;
  const labels=['A','B','C','D'];
  const numClass=isAI?'q-num ai-num':'q-num';
  const numLabel=isAI?`AI-${i+1}`:`Q${i+1}`;

  // パッセージ分離（\n\nで区切る）
  let qText=q.q;
  let passageHtml='';
  if(q.q.includes('\n\n')){
    const parts=q.q.split('\n\n');
    qText=parts[0];
    const body=parts.slice(1).join('\n\n').replace(/\n/g,'<br>');
    passageHtml=`<div class="q-formula">${body}</div>`;
  }

  const choices=q.c.map((c,ci)=>{
    let cls='choice-btn';
    if(isDone){
      if(ci===q.a) cls+=' show-correct';
      else if(ci===a.chosen&&!a.correct) cls+=' wrong';
    }
    const onclick=isAI?`answerAI('${sid}',${i},${ci})`:`answer('${sid}',${i},${ci})`;
    return `<button class="${cls}" ${isDone?'disabled':''} onclick="${onclick}">
      <span class="choice-label">${labels[ci]}</span><span>${c}</span>
    </button>`;
  }).join('');

  let expHtml='';
  if(isDone){
    const ok=a.correct;
    expHtml=`<div class="explanation ${ok?'correct-exp':'wrong-exp'}">
      <div class="exp-head">${ok?'✅ 正解！':`❌ 不正解。正解：「${q.c[q.a]}」`}</div>
      <div>${q.exp}</div>
    </div>`;
  }
  return `<div class="q-card">
    <div class="q-head"><span class="${numClass}">${numLabel}</span><div class="q-text">${qText.replace(/\n/g,'<br>')}</div></div>
    <div class="q-body">${passageHtml}<div class="choices">${choices}</div>${expHtml}</div>
  </div>`;
}

function answer(sid,qi,chosen){
  answered[sid][qi]={chosen,correct:chosen===QUESTIONS[sid][qi].a};
  renderMain();updateScore();
}
function answerAI(sid,qi,chosen){
  aiAnswered[sid][qi]={chosen,correct:chosen===aiQuestions[sid][qi].a};
  renderMain();updateScore();
}

function renderSectionResult(sid){
  const correct=Object.values(answered[sid]).filter(a=>a.correct).length;
  const total=QUESTIONS[sid].length;
  const pct=Math.round(correct/total*100);
  let emoji='😢',doshi='「玉手箱は形式に慣れることが重要。解説を読んでパターンを掴もう。」';
  if(pct>=80){emoji='🏆';doshi='「玉手箱対策は万全！AI出題でさらに実力を上げよう！」';}
  else if(pct>=60){emoji='😊';doshi='「あと一歩！間違えた問題のパターンを繰り返し確認して。」';}
  else if(pct>=40){emoji='😅';doshi='「基礎から固め直そう。特に四則逆算は反射的に解けるまで練習。」';}
  return `<div class="section-result">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${correct}<span> / ${total}問</span></div>
    <div class="result-pct" style="color:${pct>=60?'var(--teal)':'#ef4444'}">${pct}%</div>
    <div class="doshi-box"><span class="doshi-label">🔥 キャリ爺より</span><p>${doshi}</p></div>
    <button class="btn-retry" onclick="retrySection('${sid}')">🔄 もう一度解く</button>
  </div>`;
}
function retrySection(sid){answered[sid]={};renderMain();updateScore();}

function renderAISection(sid){
  const s=SECTIONS.find(x=>x.id===sid);
  const diff=selectedDifficulty[sid];
  const loading=aiLoading[sid];
  const aiQs=aiQuestions[sid];
  const aiAns=aiAnswered[sid];
  let aiQsHtml='';
  if(aiQs.length>0){
    aiQsHtml='<div style="display:flex;flex-direction:column;gap:10px;">'
      +aiQs.map((q,i)=>renderQCard(sid,i,q,aiAns[i],true)).join('')+'</div>';
  }
  const loadingHtml=loading?`<div class="ai-loading">🤖 AIが問題を生成中<span class="ai-loading-dots"></span></div>`:'';
  return `<div class="ai-section">
    <div class="ai-section-head">
      <span class="ai-section-icon">🤖</span>
      <div>
        <div class="ai-section-title">AI自動出題コーナー｜${s.name}</div>
        <div class="ai-section-sub">難易度を選んでAIが新問題を5問生成（何度でも挑戦可）</div>
      </div>
    </div>
    <div class="ai-section-body">
      <div class="ai-note">⚠️ AIが生成した問題です。まれに不正確な場合があります。参考程度にご活用ください。</div>
      <div class="ai-controls">
        <span class="ai-controls-label">難易度：</span>
        <button class="difficulty-btn normal${diff==='normal'?' selected':''}" onclick="setDifficulty('${sid}','normal')">📗 普通</button>
        <button class="difficulty-btn hard${diff==='hard'?' selected':''}" onclick="setDifficulty('${sid}','hard')">📕 難関</button>
        <button class="btn-ai-generate" onclick="generateAI('${sid}')" ${loading?'disabled':''}>
          ${loading?'⏳ 生成中...':'✨ AI問題を生成（5問）'}
        </button>
      </div>
      ${loadingHtml}${aiQsHtml}
    </div>
  </div>`;
}
function setDifficulty(sid,diff){selectedDifficulty[sid]=diff;renderMain();}

async function generateAI(sid){
  const s=SECTIONS.find(x=>x.id===sid);
  const diff=selectedDifficulty[sid];
  const diffLabel=diff==='hard'?'難関（応用・高難度）':'普通（標準レベル）';
  const prompts={
    shisoku:'玉手箱形式の四則逆算問題（□に入る数を求める計算問題）',
    zuhyo:'玉手箱形式の図表読み取り問題（表・グラフから数値を読み取り計算する問題）',
    gengo:'玉手箱形式の言語問題（文章の趣旨把握・論旨理解・空欄補充）',
    eng:'玉手箱GAB形式の英語問題（英文パッセージの内容理解・推論問題）',
  };
  const systemPrompt=`あなたは玉手箱試験の問題作成専門家です。${prompts[sid]}を${diffLabel}レベルで5問作成してください。
必ずJSON形式のみで返答。{"questions":[{"q":"問題文","c":["A","B","C","D"],"a":正解インデックス(0-3),"exp":"解説（100字以内）"}]}
条件：4択・正解1つ・解説簡潔（計算過程を含む）・${diff==='hard'?'高難度の応用問題':'基本を押さえた標準問題'}・日本語（英語セクションはパッセージ英語・設問日本語OK）`;
  const userContent=`${prompts[sid]}を${diffLabel}で5問。JSON形式のみ。`;
  aiLoading[sid]=true;renderMain();
  try{
    const key=getGeminiKey();
    if(!key) throw new Error('NO_KEY');
    const text=await callGemini(systemPrompt, userContent);
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    aiQuestions[sid]=parsed.questions||[];
    aiAnswered[sid]={};
  }catch(e){
    if(e.message==='NO_KEY'){
      aiQuestions[sid]=[{q:'⚠️ Gemini APIキーが設定されていません。トップページ（index.html）でAPIキーを設定してください。',c:['トップページへ戻る','—','—','—'],a:0,exp:'index.htmlのAPIキー設定欄にGemini APIキーを入力・保存してください。'}];
    } else {
      aiQuestions[sid]=[{q:'AI問題の生成中にエラーが発生しました。APIキーを確認してもう一度お試しください。',c:['再試行する','—','—','—'],a:0,exp:'ネットワークエラーまたはAPI応答の解析に失敗しました。エラー：'+e.message}];
    }
    aiAnswered[sid]={};
  }
  aiLoading[sid]=false;renderMain();
}

function resetAll(){
  answered={shisoku:{},zuhyo:{},gengo:{},eng:{}};
  aiAnswered={shisoku:{},zuhyo:{},gengo:{},eng:{}};
  aiQuestions={shisoku:[],zuhyo:[],gengo:[],eng:[]};
  renderMain();updateScore();
}

buildTabs();renderMain();updateScore();
</script>

</html>
