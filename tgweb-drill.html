<style>
:root{
  --green-dark:#2C5F2D;--green-mid:#4A8C4B;--green-light:#97BC62;
  --green-pale:#E8F5E9;--green-ultra:#F0FDF0;
  --amber:#F59E0B;--amber-light:#FEF3C7;
  --gray-dark:#1F2937;--gray-mid:#6B7280;--gray-light:#F3F4F6;
  --white:#FFFFFF;
  --shadow-sm:0 2px 8px rgba(44,95,45,0.10);
  --shadow-md:0 6px 24px rgba(44,95,45,0.15);

  --teal:#0F766E;--teal-pale:#F0FDFA;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--green-ultra);min-height:100vh;color:var(--gray-dark);}

.hero{background:linear-gradient(150deg,#1e3a5f 0%,#1e40af 55%,#3b82f6 100%);padding:36px 20px 0;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 50%,rgba(147,197,253,0.15) 0%,transparent 55%);pointer-events:none;}
.hero-tree{position:absolute;right:-10px;bottom:0;font-size:110px;opacity:0.09;line-height:1;pointer-events:none;}
.brand-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.90);font-size:11px;font-weight:700;letter-spacing:0.12em;padding:5px 14px;border-radius:20px;margin-bottom:14px;}
.hero-icon{font-size:48px;display:block;animation:floatIcon 3s ease-in-out infinite;margin-bottom:8px;}
@keyframes floatIcon{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.hero h1{font-size:clamp(20px,5vw,28px);font-weight:900;color:#fff;margin-bottom:6px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.80);line-height:1.6;padding-bottom:20px;}
.hero-badge-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding-bottom:16px;}
.hero-badge{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}

.section-bar{background:rgba(0,0,0,0.20);padding:12px 12px 0;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.section-tab{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:12px 12px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.80);transition:all 0.18s;white-space:nowrap;}
.section-tab:hover{background:rgba(255,255,255,0.22);}
.section-tab.active{background:var(--white);color:#1e3a5f;}

.content{max-width:700px;margin:0 auto;padding:24px 16px 60px;}

.score-bar{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.score-label{font-size:11px;font-weight:700;color:var(--gray-mid);margin-bottom:2px;}
.score-nums{font-size:22px;font-weight:900;color:#1e40af;}
.score-nums span{font-size:13px;font-weight:400;color:var(--gray-mid);}
.progress-wrap{flex:1;min-width:120px;}
.progress-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#1e40af,#3b82f6);border-radius:4px;transition:width 0.4s ease;}
.progress-text{font-size:10px;color:var(--gray-mid);margin-top:4px;}
.btn-reset{padding:7px 14px;background:#EFF6FF;border:1px solid #BFDBFE;color:#1e40af;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-reset:hover{background:#DBEAFE;}

.section-header{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);padding:16px 20px;margin-bottom:16px;border-left:5px solid #1e40af;}
.section-header h2{font-size:17px;font-weight:900;color:#1e3a5f;margin-bottom:4px;}
.section-header p{font-size:12px;color:var(--gray-mid);line-height:1.6;}
.tgweb-note{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:1px solid #BFDBFE;border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px;color:#1e3a5f;line-height:1.7;}

.subsection-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--gray-mid);letter-spacing:0.08em;margin:20px 0 10px;}

.q-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.q-head{padding:13px 16px 10px;border-bottom:1px solid #F0F0F0;display:flex;align-items:flex-start;gap:10px;}
.q-num{background:#1e40af;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.q-num.ai-num{background:var(--purple);}
.q-text{font-size:13px;font-weight:700;line-height:1.65;color:var(--gray-dark);}
.q-passage{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px 14px;margin:8px 0;font-size:12px;line-height:1.9;color:#334155;}
.q-body{padding:10px 16px 14px;}
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;border:1.5px solid #E5E7EB;background:#FAFAFA;cursor:pointer;text-align:left;font-size:13px;font-weight:500;color:var(--gray-dark);transition:all 0.15s;width:100%;}
.choice-btn:hover:not(:disabled){border-color:#1e40af;background:#EFF6FF;color:#1e3a5f;}

.choice-btn:hover:not(:disabled) .choice-label{background:#1e40af;color:#fff;}
.choice-btn.correct{border-color:#22c55e;background:#F0FDF4;color:#15803d;}

.choice-btn.wrong{border-color:#ef4444;background:#FEF2F2;color:#991b1b;}
.choice-btn.wrong .choice-label{background:#ef4444;color:#fff;}
.choice-btn.show-correct{border-color:#22c55e;background:#F0FDF4;color:#15803d;}
.choice-btn.show-correct .choice-label{background:#22c55e;color:#fff;}

.explanation{margin-top:10px;padding:11px 13px;border-radius:9px;font-size:12px;line-height:1.75;}

.explanation.wrong-exp{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:1px solid #FDE68A;color:#78350f;}
.exp-head{font-size:11px;font-weight:700;margin-bottom:4px;}

.section-result{background:var(--white);border-radius:14px;box-shadow:var(--shadow-md);padding:24px;text-align:center;margin-bottom:16px;}

.result-score{font-size:40px;font-weight:900;color:#1e40af;}
.result-score span{font-size:16px;color:var(--gray-mid);font-weight:400;}
.result-pct{font-size:24px;font-weight:900;margin:4px 0 12px;}
.doshi-box{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border-left:4px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;text-align:left;margin:12px 0;}
.doshi-label{font-size:10px;font-weight:700;color:#92400E;margin-bottom:4px;display:block;}
.doshi-box p{font-size:12px;color:#78350F;font-style:italic;line-height:1.75;}
.btn-retry{padding:10px 24px;background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-retry:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}

.ai-section{background:var(--white);border-radius:16px;box-shadow:var(--shadow-md);margin-bottom:16px;overflow:hidden;}
.ai-section-head{background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:16px 20px;display:flex;align-items:center;gap:12px;}
.ai-section-icon{font-size:28px;}
.ai-section-title{color:#fff;font-size:15px;font-weight:900;}
.ai-section-sub{color:rgba(255,255,255,0.80);font-size:11px;margin-top:2px;}
.ai-section-body{padding:18px 20px;}
.ai-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.ai-controls-label{font-size:12px;font-weight:700;color:var(--gray-dark);}
.difficulty-btn{padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.difficulty-btn.normal{background:var(--green-pale);border-color:#C8E6C9;color:var(--green-dark);}

.difficulty-btn.hard{background:var(--purple-pale);border-color:#C4B5FD;color:var(--purple);}

.btn-ai-generate:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.ai-loading{text-align:center;padding:20px;color:var(--purple);font-size:13px;font-weight:600;}

.ai-note{font-size:11px;color:var(--gray-mid);background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;margin-bottom:12px;}

.footer{text-align:center;padding:0 16px 40px;font-size:11px;color:var(--gray-mid);}

@media(max-width:480px){.hero{padding:28px 14px 0;}.content{padding:18px 12px 50px;}.q-text{font-size:12px;}.choice-btn{font-size:12px;padding:9px 11px;}}
</style>

<script>

// ====== APIキー管理（sessionStorage使用） ======
const GEMINI_KEY_NAME = 'shukatsu_gemini_key';

function getGeminiKey() {
  return sessionStorage.getItem(GEMINI_KEY_NAME) || '';
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { showApiStatus('❌ キーを入力してください', '#fca5a5'); return; }
  if (!key.startsWith('AIza')) { showApiStatus('⚠️ AIzaSy...で始まるキーを入力', '#fde68a'); return; }
  sessionStorage.setItem(GEMINI_KEY_NAME, key);
  document.getElementById('apiKeyInput').value = '';
  showApiStatus('✅ 保存済み！AI出題が使えます', '#86efac');
}

function clearApiKey() {
  sessionStorage.removeItem(GEMINI_KEY_NAME);
  showApiStatus('🗑️ 削除しました', '#e5e7eb');
}

function showApiStatus(msg, color) {
  const el = document.getElementById('apiKeyStatus');
  el.style.color = color;
  el.textContent = msg;
  setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 5000);
}

// ページ読み込み時に保存済みキーを確認
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem(GEMINI_KEY_NAME);
  if (saved) showApiStatus('✅ APIキー設定済み', '#86efac');
});

async function callGemini(systemPrompt, userPrompt) {
  const key = getGeminiKey();
  if (!key) throw new Error('NO_KEY');
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API Error');
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}



const SECTIONS = [
  { id:'lang', icon:'📖', name:'言語（長文・論理）', desc:'長文読解・文章整序・論理的推論・語句の関係' },
  { id:'calc', icon:'🔢', name:'計数（数理・推論）', desc:'鶴亀算・ニュートン算・順列組み合わせ・数列・論理推論' },
  { id:'eng',  icon:'🇬🇧', name:'英語（速読・語彙）', desc:'長文読解・語彙・文法・英文整序' },
];

const QUESTIONS = {
lang:[
  // 長文読解
  {q:'次の文章を読み、問いに答えよ。\n\n「現代社会において、情報リテラシーとは単に情報を収集する能力ではなく、その情報の信頼性を評価し、批判的に分析する能力を指す。インターネットの普及により、誰もが情報を発信できる時代となったが、それは同時に誤情報や偽情報が氾濫するリスクをはらんでいる。」\n\nこの文章が主張していることとして最も適切なものはどれか。',c:['インターネットは廃止すべきである','情報リテラシーとは情報を批判的に分析する能力が重要だ','情報収集能力さえあれば現代社会を生き抜ける','誰でも情報発信できることは良いことである'],a:1,exp:'本文は「情報の信頼性を評価し批判的に分析する能力」を情報リテラシーの本質として強調している。'},
  {q:'次の文章の空欄に入る最も適切な語句を選べ。\n\n「科学的思考とは、仮説を立て、実験によって検証し、その結果を（　）する能力である。感情ではなくデータに基づいて判断することが科学の基本姿勢だ。」',c:['否定','客観的に解釈','主観的に評価','無視'],a:1,exp:'科学的思考の流れは「仮説→実験→客観的な解釈」。感情でなくデータに基づく点から「客観的に解釈」が適切。'},
  {q:'次の文章の論旨として最も適切なものを選べ。\n\n「リーダーシップとは、指示を与えることではない。チームメンバーが自ら考え、行動できる環境を整えることこそが真のリーダーシップである。優れたリーダーは、部下の力を引き出す存在だ。」',c:['リーダーは強い指示力が必要だ','真のリーダーシップはメンバーの主体性を引き出すことだ','チームメンバーは指示がなければ動けない','リーダーの役割は環境整備だけである'],a:1,exp:'「チームが自ら考え行動できる環境を整える＝力を引き出す」が本文の主旨。指示することではないと明確に述べている。'},
  {q:'次の文の論理関係として正しいものを選べ。\n\n「すべての鳥は卵を産む。ペンギンは鳥である。したがって、ペンギンは（　）。」',c:['飛ぶことができる','卵を産む','哺乳類である','泳ぐことができない'],a:1,exp:'三段論法：「すべての鳥→卵を産む」「ペンギン→鳥」∴「ペンギン→卵を産む」。飛ぶかどうかは前提に含まれない。'},
  {q:'次の文章の下線部「一石二鳥」と同じ論理構造はどれか。\n\n「新しいシステムを導入することで、作業効率が上がり、かつコストも削減できた。まさに一石二鳥だ。」',c:['一つの問題が別の問題を引き起こした','一つの行動で二つの利益を得た','二つの問題を一つずつ解決した','多くの犠牲で一つの成果を得た'],a:1,exp:'「一石二鳥」＝一つの行動で二つの利益。本文も「一つのシステム導入→効率向上＋コスト削減」という構造。'},
  // 文章整序
  {q:'次の文を正しい順序に並べたものを選べ。\n\nA：しかし、ただ謝るだけでは信頼を取り戻すことはできない。\nB：ミスをしたとき、まず謝罪することは社会人として基本だ。\nC：再発防止策を示すことが、真の誠意といえる。\nD：謝罪に加えて、原因の分析と改善策の提示が必要だ。',c:['B→A→D→C','A→B→C→D','B→D→A→C','A→D→B→C'],a:0,exp:'B（謝罪が基本）→A（しかしそれだけでは不十分）→D（原因分析・改善策が必要）→C（それが真の誠意）という逆接→展開の流れ。'},
  {q:'次の4文を意味が通るよう並べよ。\n\nA：その結果、睡眠不足は判断力や集中力を著しく低下させる。\nB：現代人は慢性的な睡眠不足に陥りやすい環境にある。\nC：したがって、意識的に睡眠時間を確保することが重要だ。\nD：スマートフォンや残業により、就寝時間が遅くなりがちだからだ。',c:['B→D→A→C','A→B→C→D','D→B→A→C','B→A→D→C'],a:0,exp:'B（現状）→D（理由）→A（結果）→C（結論）という論理の流れが最も自然。'},

let currentSection = 'lang';
let answered = {lang:{},calc:{},eng:{}};
let aiAnswered = {lang:{},calc:{},eng:{}};
let aiQuestions = {lang:[],calc:[],eng:[]};
let selectedDifficulty = {lang:'normal',calc:'normal',eng:'normal'};
let aiLoading = {lang:false,calc:false,eng:false};
const TOTAL_FIXED = Object.values(QUESTIONS).reduce((s,q)=>s+q.length,0);

function buildTabs(){
  document.getElementById('sectionBar').innerHTML = SECTIONS.map(s=>`
    <button class="section-tab${s.id===currentSection?' active':''}" onclick="switchSection('${s.id}')">
      ${s.icon} ${s.name}
    </button>`).join('');
}
function switchSection(id){currentSection=id;buildTabs();renderMain();updateScore();}

function updateScore(){
  let correct=0,done=0;
  ['lang','calc','eng'].forEach(sid=>{
    Object.values(answered[sid]).forEach(a=>{if(a.correct)correct++;done++;});
    Object.values(aiAnswered[sid]).forEach(a=>{if(a.correct)correct++;done++;});
  });
  document.getElementById('totalScore').innerHTML=`${correct}<span> / ${done}問</span>`;
  const pct=done>0?Math.round(correct/done*100):0;
  document.getElementById('progressFill').style.width=Math.min(done/TOTAL_FIXED*100,100)+'%';
  document.getElementById('progressText').textContent=`${pct}% 正答率（${done}/${TOTAL_FIXED}問以上回答済み）`;
}

function renderMain(){
  const s=SECTIONS.find(x=>x.id===currentSection);
  const qs=QUESTIONS[currentSection];
  const ans=answered[currentSection];
  const allDone=Object.keys(ans).length===qs.length;

  const tgNote={
    lang:'TG-WEB言語は長文読解・文章整序・論理推論が中心。「接続詞の流れ」と「論理の構造」を意識して読もう。',
    calc:'TG-WEB計数は鶴亀算・ニュートン算・順列組み合わせが頻出。式を立てる練習を繰り返すことが大切。',

  };

  let html=`
    <div class="section-header">
      <h2>${s.icon} ${s.name}（固定問題：全${qs.length}問）</h2>
      <p>${s.desc}</p>
      <div class="tgweb-note">💡 TG-WEB攻略ポイント：${tgNote[currentSection]}</div>
    </div>`;

  if(allDone){
    html+=renderSectionResult(currentSection);
  } else {
    html+=`<div class="subsection-label">📝 問題を解いてみよう</div>`;
    html+=qs.map((q,i)=>renderQCard(currentSection,i,q,ans[i],false)).join('');
  }
  html+=`

    </div>
    <div style="font-size:12px;line-height:1.8;opacity:0.92;">
      AIが新しい問題を<strong style="color:#fde68a;">無制限</strong>に自動生成！<br>
      普通・難関の2レベルで何度でも練習できます。<br><br>
      <strong style="color:#fde68a;">→ 上の紫色のバーにAPIキーを入力するだけ！</strong><br>
      無料・3分で取得：<a href="https://aistudio.google.com/app/apikey" target="_blank"
        style="color:#fde68a;font-weight:700;">aistudio.google.com</a>
    </div>
  </div>
</div>
`;
  html+=renderAISection(currentSection);
  document.getElementById('mainArea').innerHTML=html;
}

function renderQCard(sid,i,q,a,isAI){
  const isDone=a!==undefined;
  const labels=['A','B','C','D'];
  const numClass=isAI?'q-num ai-num':'q-num';
  const numLabel=isAI?`AI-${i+1}`:`Q${i+1}`;
  const fn=isAI?`answerAI('${sid}',${i},${ci})`:'';

  // パッセージがある場合（\nで段落区切り）
  let qText=q.q;
  let passageHtml='';
  if(q.q.includes('\n\n')){
    const parts=q.q.split('\n\n');
    qText=parts[0];
    passageHtml=`<div class="q-passage">${parts.slice(1).join('<br><br>').replace(/\n/g,'<br>')}</div>`;
  }

  const choices=q.c.map((c,ci)=>{
    let cls='choice-btn';
    if(isDone){
      if(ci===q.a) cls+=' show-correct';
      else if(ci===a.chosen&&!a.correct) cls+=' wrong';
    }
    const onclick=isAI?`answerAI('${sid}',${i},${ci})`:`answer('${sid}',${i},${ci})`;
    return `<button class="${cls}" ${isDone?'disabled':''} onclick="${onclick}">
      <span class="choice-label">${labels[ci]}</span><span>${c}</span>
    </button>`;
  }).join('');

  let expHtml='';
  if(isDone){
    const ok=a.correct;
    expHtml=`<div class="explanation ${ok?'correct-exp':'wrong-exp'}">
      <div class="exp-head">${ok?'✅ 正解！':`❌ 不正解。正解：「${q.c[q.a]}」`}</div>
      <div>${q.exp}</div>
    </div>`;
  }
  return `<div class="q-card">
    <div class="q-head"><span class="${numClass}">${numLabel}</span><div class="q-text">${qText.replace(/\n/g,'<br>')}</div></div>
    <div class="q-body">${passageHtml}<div class="choices">${choices}</div>${expHtml}</div>
  </div>`;
}

function answer(sid,qi,chosen){
  const q=QUESTIONS[sid][qi];
  answered[sid][qi]={chosen,correct:chosen===q.a};
  renderMain();updateScore();
}
function answerAI(sid,qi,chosen){
  const q=aiQuestions[sid][qi];
  aiAnswered[sid][qi]={chosen,correct:chosen===q.a};
  renderMain();updateScore();
}

function renderSectionResult(sid){
  const qs=QUESTIONS[sid];
  const ans=answered[sid];
  const correct=Object.values(ans).filter(a=>a.correct).length;
  const total=qs.length;
  const pct=Math.round(correct/total*100);
  let emoji='😢',msg='もう一度挑戦！',doshi='「TG-WEBは独特の形式です。解説を読んで考え方のパターンを掴もう。」';
  if(pct>=80){emoji='🏆';msg='TG-WEB対策は万全！';doshi='「この得点なら本番でも自信を持って臨めます！」';}
  else if(pct>=60){emoji='😊';msg='合格ライン！もう少し！';doshi='「間違えた問題の解法を繰り返し確認しましょう。」';}
  else if(pct>=40){emoji='😅';msg='基礎から固め直そう。';doshi='「TG-WEBは形式に慣れることが重要。解説を丁寧に読んで。」';}
  return `<div class="section-result">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${correct}<span> / ${total}問</span></div>
    <div class="result-pct" style="color:${pct>=60?'#1e40af':'#ef4444'}">${pct}%</div>
    <div style="font-size:13px;color:var(--gray-mid);margin-bottom:8px;">${msg}</div>
    <div class="doshi-box"><span class="doshi-label">🔥 キャリ爺より</span><p>${doshi}</p></div>
    <button class="btn-retry" onclick="retrySection('${sid}')">🔄 もう一度解く</button>
  </div>`;
}
function retrySection(sid){answered[sid]={};renderMain();updateScore();}

function renderAISection(sid){
  const s=SECTIONS.find(x=>x.id===sid);
  const diff=selectedDifficulty[sid];
  const loading=aiLoading[sid];
  const aiQs=aiQuestions[sid];
  const aiAns=aiAnswered[sid];
  let aiQsHtml='';
  if(aiQs.length>0){
    aiQsHtml='<div style="display:flex;flex-direction:column;gap:10px;">'
      +aiQs.map((q,i)=>renderQCard(sid,i,q,aiAns[i],true)).join('')+'</div>';
  }
  const loadingHtml=loading?`<div class="ai-loading">🤖 AIが問題を生成中<span class="ai-loading-dots"></span></div>`:'';
  return `<div class="ai-section">
    <div class="ai-section-head">
      <span class="ai-section-icon">🤖</span>
      <div>
        <div class="ai-section-title">AI自動出題コーナー｜${s.name}</div>
        <div class="ai-section-sub">難易度を選んでAIが新問題を5問生成します（何度でも挑戦可）</div>
      </div>
    </div>
    <div class="ai-section-body">
      <div class="ai-note">⚠️ AIが生成した問題です。まれに不正確な場合があります。解説も参考程度にご活用ください。</div>
      <div class="ai-controls">
        <span class="ai-controls-label">難易度：</span>
        <button class="difficulty-btn normal${diff==='normal'?' selected':''}" onclick="setDifficulty('${sid}','normal')">📗 普通</button>
        <button class="difficulty-btn hard${diff==='hard'?' selected':''}" onclick="setDifficulty('${sid}','hard')">📕 難関</button>
        <button class="btn-ai-generate" onclick="generateAI('${sid}')" ${loading?'disabled':''}>
          ${loading?'⏳ 生成中...':'✨ AI問題を生成（5問）'}
        </button>
      </div>
      ${loadingHtml}${aiQsHtml}
    </div>
  </div>`;
}

function setDifficulty(sid,diff){selectedDifficulty[sid]=diff;renderMain();}

async function generateAI(sid){
  const s=SECTIONS.find(x=>x.id===sid);
  const diff=selectedDifficulty[sid];
  const diffLabel=diff==='hard'?'難関（応用・複合問題）':'普通（標準レベル）';
  const prompts={
    lang:'TG-WEB形式の言語問題（長文読解・文章整序・論理推論・語彙）',
    calc:'TG-WEB形式の計数問題（鶴亀算・ニュートン算・順列組み合わせ・数列・集合）',
    eng:'TG-WEB形式の英語問題（ビジネス英語・長文読解・文法・語彙）',
  };
  const systemPrompt=`あなたはTG-WEB試験の問題作成専門家です。${prompts[sid]}を${diffLabel}レベルで5問作成してください。
TG-WEBの特徴：長文読解・論理推論・文章整序（言語）、鶴亀算・ニュートン算・確率（計数）、速読・ビジネス英語（英語）。
必ずJSON形式のみで返答。{"questions":[{"q":"問題文","c":["A","B","C","D"],"a":正解インデックス,"exp":"解説（100字以内）"}]}
条件：4択・正解1つ・解説簡潔・${diff==='hard'?'高難度の応用問題':'基本を押さえた標準問題'}・日本語（英語セクションは英語OK）`;

  aiLoading[sid]=true;renderMain();
  try{
    const key=getGeminiKey();
    if(!key) throw new Error('NO_KEY');
    const text=await callGemini(systemPrompt, userContent);
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    aiQuestions[sid]=parsed.questions||[];
    aiAnswered[sid]={};
  }catch(e){
    if(e.message==='NO_KEY'){
      aiQuestions[sid]=[{q:'⚠️ Gemini APIキーが設定されていません。トップページ（index.html）でAPIキーを設定してください。',c:['トップページへ戻る','—','—','—'],a:0,exp:'index.htmlのAPIキー設定欄にGemini APIキーを入力・保存してください。'}];
    } else {
      aiQuestions[sid]=[{q:'AI問題の生成中にエラーが発生しました。APIキーを確認してもう一度お試しください。',c:['再試行する','—','—','—'],a:0,exp:'ネットワークエラーまたはAPI応答の解析に失敗しました。エラー：'+e.message}];
    }
    aiAnswered[sid]={};
  }
  aiLoading[sid]=false;renderMain();
}

function resetAll(){
  answered={lang:{},calc:{},eng:{}};
  aiAnswered={lang:{},calc:{},eng:{}};
  aiQuestions={lang:[],calc:[],eng:[]};
  renderMain();updateScore();
}

buildTabs();renderMain();updateScore();
</script>
