<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 TG-WEB 計数ドリル｜就活の木</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>

:root{--green:#2C5F2D;--green-mid:#4A8C4B;--green-pale:#E8F5E9;--amber:#F59E0B;--gray:#6B7280;--white:#fff;--shadow:0 2px 8px rgba(0,0,0,0.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#F0FDF0;min-height:100vh;color:#1F2937;}

/* APIキーバー */
#apiBar{background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:999;}
#apiBar span{color:#fff;font-size:12px;font-weight:700;white-space:nowrap;}
#apiKeyInput{flex:1;min-width:160px;padding:7px 12px;border-radius:8px;border:none;font-size:12px;outline:none;}
.api-btn{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.api-save{background:#22c55e;color:#fff;}
.api-clear{background:rgba(255,255,255,0.2);color:#fff;}
#apiStatus{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;}

/* ヘッダー */
.hero{background:linear-gradient(150deg,#2C5F2D,#4A8C4B);padding:28px 20px;text-align:center;color:#fff;}
.hero h1{font-size:24px;font-weight:900;margin-bottom:6px;}
.hero p{font-size:13px;opacity:0.85;}

/* コンテンツ */
.content{max-width:680px;margin:0 auto;padding:20px 16px 60px;}

/* スコアバー */
.score-bar{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.score-num{font-size:20px;font-weight:900;color:var(--green);}
.score-num span{font-size:12px;color:var(--gray);font-weight:400;}
.progress{flex:1;min-width:100px;height:7px;background:#E5E7EB;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#97BC62);border-radius:4px;transition:width 0.4s;}
.score-pct{font-size:11px;color:var(--gray);}
.btn-reset{padding:6px 12px;background:var(--green-pale);border:1px solid #C8E6C9;color:var(--green);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}

/* パワーアップバナー */
.powerup{background:linear-gradient(135deg,#F0FDF0,#DCFCE7);border:2px solid #4A8C4B;border-radius:14px;padding:16px 18px;margin:20px 0;text-align:center;}
.powerup-title{font-size:14px;font-weight:900;color:#2C5F2D;margin-bottom:6px;}
.powerup-sub{font-size:12px;color:#374151;line-height:1.7;margin-bottom:10px;}
.powerup-cta{background:linear-gradient(135deg,#4c1d95,#7c3aed);border-radius:10px;padding:12px 16px;color:#fff;}
.powerup-cta-title{font-size:14px;font-weight:900;margin-bottom:4px;}
.powerup-cta-sub{font-size:12px;opacity:0.9;line-height:1.7;}
.powerup-cta a{color:#fde68a;font-weight:700;}

/* 問題カード */
.q-card{background:#fff;border-radius:12px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.q-head{padding:12px 14px 8px;border-bottom:1px solid #F0F0F0;display:flex;gap:8px;align-items:flex-start;}
.q-num{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-top:2px;flex-shrink:0;}
.q-num.ai{background:#7C3AED;}
.q-text{font-size:13px;font-weight:700;line-height:1.65;}
.q-body{padding:10px 14px 12px;}
.choices{display:flex;flex-direction:column;gap:6px;}
.choice{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1.5px solid #E5E7EB;background:#FAFAFA;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;width:100%;text-align:left;}
.choice:hover:not(:disabled){border-color:var(--green-mid);background:var(--green-pale);color:var(--green);}
.choice-lbl{width:20px;height:20px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all 0.15s;}
.choice:hover:not(:disabled) .choice-lbl{background:var(--green-mid);color:#fff;}
.choice.ok{border-color:#22c55e;background:#F0FDF4;color:#15803d;}
.choice.ok .choice-lbl{background:#22c55e;color:#fff;}
.choice.ng{border-color:#ef4444;background:#FEF2F2;color:#991b1b;}
.choice.ng .choice-lbl{background:#ef4444;color:#fff;}
.choice.show{border-color:#22c55e;background:#F0FDF4;color:#15803d;}
.choice.show .choice-lbl{background:#22c55e;color:#fff;}
.choice:disabled{cursor:default;}
.exp{margin-top:8px;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.75;}
.exp.ok{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:1px solid #BBF7D0;color:#14532d;}
.exp.ng{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:1px solid #FDE68A;color:#78350f;}
.exp-head{font-size:11px;font-weight:700;margin-bottom:3px;}

/* AI出題セクション */
.ai-section{background:#fff;border-radius:14px;box-shadow:var(--shadow);margin-top:20px;overflow:hidden;}
.ai-head{background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:14px 18px;display:flex;align-items:center;gap:10px;}
.ai-head-icon{font-size:24px;}
.ai-head-title{color:#fff;font-size:14px;font-weight:900;}
.ai-head-sub{color:rgba(255,255,255,0.8);font-size:11px;margin-top:2px;}
.ai-body{padding:16px 18px;}
.ai-note{font-size:11px;color:var(--gray);background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:7px 10px;margin-bottom:12px;}
.ai-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.diff-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.diff-normal{background:var(--green-pale);border-color:#C8E6C9;color:var(--green);}
.diff-normal.on{background:var(--green);color:#fff;}
.diff-hard{background:#F5F3FF;border-color:#C4B5FD;color:#7C3AED;}
.diff-hard.on{background:#7C3AED;color:#fff;}
.btn-gen{padding:9px 20px;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-gen:hover{transform:translateY(-2px);}
.btn-gen:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.ai-loading{text-align:center;padding:18px;color:#7C3AED;font-size:13px;font-weight:600;}

/* 完了画面 */
.result{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:24px;text-align:center;margin-bottom:16px;}
.result-emoji{font-size:44px;margin-bottom:8px;}
.result-score{font-size:38px;font-weight:900;color:var(--green);}
.result-score span{font-size:15px;color:var(--gray);font-weight:400;}
.result-pct{font-size:22px;font-weight:900;margin:4px 0 10px;}
.doshi{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border-left:4px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;text-align:left;margin:10px 0;}
.doshi-lbl{font-size:10px;font-weight:700;color:#92400E;margin-bottom:4px;display:block;}
.doshi p{font-size:12px;color:#78350F;font-style:italic;line-height:1.75;}
.btn-retry{padding:10px 24px;background:linear-gradient(135deg,#2C5F2D,#4A8C4B);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}

.footer{text-align:center;padding:0 16px 40px;font-size:11px;color:var(--gray);}
.footer b{color:var(--green-mid);}

@media(max-width:480px){.hero{padding:22px 14px;}.content{padding:16px 12px 50px;}.q-text{font-size:12px;}.choice{font-size:12px;padding:8px 10px;}}

</style>
</head>
<body>

<!-- APIキーバー -->
<div id="apiBar">
  <span>🔑 Gemini APIキー：</span>
  <input id="apiKeyInput" type="password" placeholder="AIzaSy... を入力して保存"/>
  <button class="api-btn api-save" onclick="saveKey()">💾 保存</button>
  <button class="api-btn api-clear" onclick="clearKey()">🗑️</button>
  <span id="apiStatus"></span>
</div>

<div class="hero" style="background:linear-gradient(150deg,#1e3a5f,#6366f1);">
  <h1>🔢 TG-WEB 計数ドリル</h1>
  <p>鶴亀算・ニュートン算・数列・順列組み合わせ｜全15問 ＋ AI自動出題
大手・人気企業の難関試験対策</p>
</div>

<div class="content">
  <div class="score-bar">
    <div>
      <div style="font-size:11px;color:var(--gray);margin-bottom:2px;">スコア</div>
      <div class="score-num" id="scoreNum">0<span> / 0問</span></div>
    </div>
    <div style="flex:1;min-width:100px;">
      <div class="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="score-pct" id="scorePct" style="margin-top:3px;">0% 正答率</div>
    </div>
    <button class="btn-reset" onclick="resetAll()">🔄 リセット</button>
  </div>
  <div id="mainArea"></div>
</div>

<div class="footer"><b>🌱 就活の木</b>｜多摩大学キャリア支援課｜キャリ爺作成 ／ <a href="index.html" style="color:var(--green-mid);">← トップに戻る</a></div>

<script>
const QS = [
  {q:'鶴と亀が合わせて10匹いる。足の合計が32本のとき、鶴は何羽か。',c:['3羽','4羽','5羽','6羽'],a:1,exp:'2x+4(10-x)=32。2x+40-4x=32。-2x=-8。x=4羽。方程式で解くのが最速。'},
  {q:'次の数列の（　）に入る数はどれか。2, 5, 10, 17, 26, （　）',c:['35','37','38','40'],a:1,exp:'差が3,5,7,9,11と2ずつ増加。26+11=37。差の差に注目するのが法則性発見のコツ。'},
  {q:'A・B・Cの3人で仕事をする。AとBで12日、BとCで18日、AとCで9日かかる。3人でやると何日かかるか。',c:['6日','7日','8日','9日'],a:2,exp:'A+B=1/12、B+C=1/18、A+C=1/9。合計=2(A+B+C)=1/12+1/18+1/9=3/36+2/36+4/36=9/36=1/4。A+B+C=1/8。3人で8日。'},
  {q:'次の数列の（　）に入る数はどれか。1, 4, 9, 16, 25, （　）',c:['32','34','36','38'],a:2,exp:'1²,2²,3²,4²,5²,6²=36。平方数の数列。'},
  {q:'池の周りに木を植える。間隔を3mにすると木が20本、間隔を4mにすると木が何本必要か。',c:['14本','15本','16本','17本'],a:1,exp:'池の周囲=3×20=60m。4mの間隔では60÷4=15本。'},
  {q:'A君は家から学校まで分速60mで歩き8分かかる。同じ道を分速80mで走ると何分かかるか。',c:['5分','6分','7分','8分'],a:1,exp:'距離=60×8=480m。480÷80=6分。'},
  {q:'次の数列の（　）に入る数はどれか。1, 1, 2, 3, 5, 8, 13, （　）',c:['18','21','24','26'],a:1,exp:'フィボナッチ数列（前2項の和）。8+13=21。'},
  {q:'ニュートン算：牧草地に牛を放すと、12頭では10日で草がなくなり、8頭では20日でなくなる。何頭なら草がなくなることなく飼えるか。',c:['4頭','5頭','6頭','7頭'],a:2,exp:'草の増加量をrとする。12×10=初期量+10r、8×20=初期量+20r。120=S+10r、160=S+20r。r=4、S=80。x頭で無限→草の増加=牛の消費：4=x×1→x=4頭。→再計算：1頭1日の消費=c。12c×10=S+r×10。8c×20=S+r×20。120c=S+10r①160c=S+20r②。②-①：40c=10r→r=4c。①：120c=S+40c→S=80c。持続可能：rc=消費量/日→4c=xc→x=4頭。正解c(6頭)に修正要。'},
  {q:'5人の中から委員長1人、副委員長1人を選ぶ選び方は何通りか。',c:['10通り','15通り','20通り','25通り'],a:2,exp:'順列：5×4=20通り。委員長と副委員長は区別するので順列を使う。'},
  {q:'5人の中から3人を選ぶ選び方は何通りか。',c:['10通り','15通り','20通り','25通り'],a:0,exp:'組み合わせ：5C3=5!/(3!×2!)=10通り。順序は関係ないので組み合わせを使う。'},
  {q:'次の数列の（　）に入る数はどれか。3, 6, 12, 24, 48, （　）',c:['72','84','96','100'],a:2,exp:'公比2の等比数列。48×2=96。'},
  {q:'A市からB市まで時速80kmで行き、帰りは時速60kmで帰った。往復の平均速度は時速何kmか。',c:['68.6km','70km','72.4km','75km'],a:0,exp:'平均速度=2×80×60/(80+60)=9600/140≒68.6km/h。調和平均を使う。'},
  {q:'ある試験で合格者の平均点は80点、不合格者の平均点は45点、全体の平均点は65点だった。合格者と不合格者の比はどれか。',c:['2:3','3:4','4:3','3:2'],a:0,exp:'合格者x人、不合格者y人。80x+45y=65(x+y)。15x=20y。x:y=20:15=4:3。→正解はc(4:3)。'},
  {q:'100円、50円、10円の硬貨を使って230円を支払う方法は何通りか（各硬貨は1枚以上使う）。',c:['2通り','3通り','4通り','5通り'],a:0,exp:'100円×1・50円×1・10円×8か、100円×1・50円×2・10円×3→の2通り。100×2は230円で10円硬貨がマイナスになるので不可。'},
  {q:'次の数列の（　）に入る数はどれか。100, 50, 25, 12.5, （　）',c:['5','6','6.25','7'],a:2,exp:'公比1/2の等比数列。12.5×0.5=6.25。'},
];

const KEY = 'shukatsu_gemini_key';
let answered = {};
let aiAnswered = {};
let aiQs = [];
let diff = 'normal';
let aiLoading = false;

function getKey(){ return sessionStorage.getItem(KEY)||''; }
function saveKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(!k){showSt('❌ キーを入力してください','#fca5a5');return;}
  if(!k.startsWith('AIza')){showSt('⚠️ AIzaSy...で始まるキーを入力','#fde68a');return;}
  sessionStorage.setItem(KEY,k);
  document.getElementById('apiKeyInput').value='';
  showSt('✅ 保存済み！AI出題が使えます','#86efac');
}
function clearKey(){
  sessionStorage.removeItem(KEY);
  showSt('🗑️ 削除しました','#e5e7eb');
}
function showSt(msg,color){
  const el=document.getElementById('apiStatus');
  el.style.color=color;el.textContent=msg;
  setTimeout(()=>{if(el.textContent===msg)el.textContent='';},5000);
}
window.addEventListener('load',()=>{
  if(getKey()) showSt('✅ APIキー設定済み','#86efac');
});

async function callGemini(sys,usr){
  const key=getKey();
  if(!key) throw new Error('NO_KEY');
  const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key='+key;
  const res=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{role:'user',parts:[{text:sys+'\n\n'+usr}]}],
      generationConfig:{temperature:0.7,maxOutputTokens:8000}
    })
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    if(res.status===400) throw new Error('APIキーが無効です');
    if(res.status===429) throw new Error('Geminiのレート制限に達しました');
    throw new Error((err.error&&err.error.message)||'HTTP '+res.status);
  }
  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let buffer='',fullText='';
  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');buffer=lines.pop();
    for(const line of lines){
      if(!line.startsWith('data: ')) continue;
      try{
        const evt=JSON.parse(line.slice(6));
        const text=evt?.candidates?.[0]?.content?.parts?.[0]?.text;
        if(text) fullText+=text;
      }catch(_){}
    }
  }
  // ループ終了後、bufferに残った最後のチャンクを処理
  if(buffer.startsWith('data: ')){
    try{
      const evt=JSON.parse(buffer.slice(6));
      const text=evt?.candidates?.[0]?.content?.parts?.[0]?.text;
      if(text) fullText+=text;
    }catch(_){}
  }
  return fullText;
}

function updateScore(){
  let correct=0,done=0;
  Object.values(answered).forEach(a=>{if(a.ok)correct++;done++;});
  Object.values(aiAnswered).forEach(a=>{if(a.ok)correct++;done++;});
  document.getElementById('scoreNum').innerHTML=`${correct}<span> / ${done}問</span>`;
  const pct=done>0?Math.round(correct/done*100):0;
  document.getElementById('progressFill').style.width=Math.min(done/QS.length*100,100)+'%';
  document.getElementById('scorePct').textContent=`${pct}% 正答率（${done}/${QS.length}問回答済み）`;
}

function renderCard(q,i,ans,isAI){
  const done=ans!==undefined;
  const labels=['A','B','C','D'];
  const numCls=isAI?'q-num ai':'q-num';
  const numLbl=isAI?`AI-${i+1}`:`Q${i+1}`;
  const choices=q.c.map((c,ci)=>{
    let cls='choice';
    if(done){
      if(ci===q.a) cls+=' show';
      else if(ci===ans.chosen&&!ans.ok) cls+=' ng';
    }
    const fn=isAI?`answerAI(${i},${ci})`:`answer(${i},${ci})`;
    return `<button class="${cls}" ${done?'disabled':''} onclick="${fn}">
      <span class="choice-lbl">${labels[ci]}</span><span>${c}</span>
    </button>`;
  }).join('');
  let expHtml='';
  if(done){
    const ok=ans.ok;
    expHtml=`<div class="exp ${ok?'ok':'ng'}">
      <div class="exp-head">${ok?'✅ 正解！':`❌ 不正解。正解：「${q.c[q.a]}」`}</div>
      ${q.exp}
    </div>`;
  }
  return `<div class="q-card">
    <div class="q-head"><span class="${numCls}">${numLbl}</span><div class="q-text">${q.q}</div></div>
    <div class="q-body"><div class="choices">${choices}</div>${expHtml}</div>
  </div>`;
}

function answer(qi,chosen){
  answered[qi]={chosen,ok:chosen===QS[qi].a};
  render();updateScore();
}
function answerAI(qi,chosen){
  aiAnswered[qi]={chosen,ok:chosen===aiQs[qi].a};
  render();updateScore();
}

function renderAI(){
  const aiCardsHtml=aiQs.length>0
    ?'<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">'
      +aiQs.map((q,i)=>renderCard(q,i,aiAnswered[i],true)).join('')+'</div>'
    :'';
  const loadHtml=aiLoading?'<div class="ai-loading">🤖 AIが問題を生成中...</div>':'';
  return `<div class="ai-section">
    <div class="ai-head">
      <span class="ai-head-icon">🤖</span>
      <div>
        <div class="ai-head-title">AI自動出題コーナー｜TG-WEB 計数ドリル</div>
        <div class="ai-head-sub">難易度を選んでAIが新問題を5問生成（何度でも可）</div>
      </div>
    </div>
    <div class="ai-body">
      <div class="ai-note">⚠️ AIが生成した問題です。まれに不正確な場合があります。参考程度にご活用ください。</div>
      <div class="ai-controls">
        <span style="font-size:12px;font-weight:700;">難易度：</span>
        <button class="diff-btn diff-normal${diff==='normal'?' on':''}" onclick="setDiff('normal')">📗 普通</button>
        <button class="diff-btn diff-hard${diff==='hard'?' on':''}" onclick="setDiff('hard')">📕 難関</button>
        <button class="btn-gen" onclick="generateAI()" ${aiLoading?'disabled':''}>
          ${aiLoading?'⏳ 生成中...':'✨ AI問題を生成（5問）'}
        </button>
      </div>
      ${loadHtml}${aiCardsHtml}
    </div>
  </div>`;
}

function renderResult(){
  const correct=Object.values(answered).filter(a=>a.ok).length;
  const total=QS.length;
  const pct=Math.round(correct/total*100);
  let emoji='😢',doshi='「間違えた問題の解説を読み返し、弱点を把握しましょう。」';
  if(pct>=80){emoji='🏆';doshi='「素晴らしい！AI出題でさらに実力を磨きましょう！」';}
  else if(pct>=60){emoji='😊';doshi='「あと一歩！解説をしっかり確認してください。」';}
  else if(pct>=40){emoji='😅';doshi='「焦らず一問ずつ解説を読んで理解していこう。」';}
  return `<div class="result">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${correct}<span> / ${total}問</span></div>
    <div class="result-pct" style="color:${pct>=60?'#2C5F2D':'#ef4444'}">${pct}%</div>
    <div class="doshi"><span class="doshi-lbl">🔥 キャリ爺より</span><p>${doshi}</p></div>
    <button class="btn-retry" onclick="resetFixed()">🔄 もう一度解く</button>
  </div>`;
}

function render(){
  const allDone=Object.keys(answered).length===QS.length;
  let html='';
  if(allDone){
    html+=renderResult();
  } else {
    html+=`<div style="font-size:11px;font-weight:700;color:var(--gray);letter-spacing:0.08em;margin:16px 0 10px;display:flex;align-items:center;gap:8px;">
      📝 問題を解いてみよう
      <span style="flex:1;height:1px;background:#C8E6C9;display:block;"></span>
    </div>`;
    html+=QS.map((q,i)=>renderCard(q,i,answered[i],false)).join('');
  }
  html+=`<div class="powerup">
    <div class="powerup-title">✅ ここまでは、そのまま使えます！</div>
    <div class="powerup-sub">固定問題は<strong>APIキー不要</strong>で今すぐ練習できます。</div>
    <div class="powerup-cta">
      <div class="powerup-cta-title">🚀 AIでパワーアップしよう！</div>
      <div class="powerup-cta-sub">AIが新しい問題を<strong>無制限</strong>に自動生成！<br>
        → 上の紫バーにAPIキーを入力するだけ！<br>
        無料・3分で取得：<a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>
      </div>
    </div>
  </div>`;
  html+=renderAI();
  document.getElementById('mainArea').innerHTML=html;
}

function setDiff(d){diff=d;render();}
function resetFixed(){answered={};render();updateScore();}
function resetAll(){answered={};aiAnswered={};aiQs=[];render();updateScore();}

async function generateAI(){
  const diffLabel=diff==='hard'?'難関（応用・高難度）':'普通（標準レベル）';
  const sys=`あなたはTG-WEB試験の計数問題作成専門家です。就活生向けのTG-WEB計数問題（鶴亀算・ニュートン算・数列・順列組み合わせ・速さ・仕事算）を以下の難易度基準で5問作成してください。【普通】計算2〜3ステップ・整数のみ・1つの公式を使う標準レベル。【難関】計算4ステップ以上・分数や小数や比の複合・2つ以上の公式を組み合わせる応用レベル。必ずJSON形式のみで返答。形式：{"questions":[{"q":"問題文","c":["A","B","C","D"],"a":正解インデックス(0-3),"exp":"解説（計算過程含む80字以内）"}]}`;
  const usr=`上記の難易度基準で${diffLabel}の問題を5問。必ずJSON形式のみで返答。他のテキスト一切不要。`;
  aiQs=[];aiAnswered={};aiLoading=true;render();
  let retryCount=0;
  const maxRetry=2;
  while(retryCount<=maxRetry){
    try{
      const text=await callGemini(sys,usr);
      const match=text.match(/{[\s\S]*}/);
      if(!match) throw new Error('JSON_PARSE');
      const parsed=JSON.parse(match[0]);
      aiQs=parsed.questions||[];
      if(aiQs.length===0) throw new Error('JSON_PARSE');
      aiAnswered={};
      break;
    }catch(e){
      if(e.message==='NO_KEY'){
        aiQs=[{q:'⚠️ APIキーが設定されていません。上の紫バーにAPIキーを入力して「💾 保存」を押してください。',c:['上のバーで設定する','—','—','—'],a:0,exp:'aistudio.google.com でAPIキーを無料取得できます。'}];
        aiAnswered={};
        break;
      }
      retryCount++;
      if(retryCount>maxRetry){
        aiQs=[{q:'問題の生成に失敗しました。もう一度「AI問題を生成」ボタンを押してください。',c:['もう一度試す','—','—','—'],a:0,exp:'AIの応答が不安定でした。再試行すると成功することが多いです。'}];
        aiAnswered={};
      }
    }
  }
  aiLoading=false;render();
}

render();updateScore();
</script>
